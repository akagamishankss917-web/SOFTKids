  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#7ec8e3;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
  }
  body { display:flex; align-items:center; justify-content:center; }
  #stage {
    display:block;
    flex:0 0 auto;                    /* never let the flex row shrink the stage */
    width:100vw; height:56.25vw;      /* 16:9 */
    max-height:100vh; max-width:177.78vh;
    transform-origin:center center;
    touch-action:none;
  }
  #stage { font-family:'Fredoka',system-ui,sans-serif; }
  #stage text { pointer-events:none; }

  /* Every control squashes when pressed. A toy that does not give under a finger
     feels dead; this is the cheapest way to make the game feel physical.
     Spring easing, 140ms — inside the 150-300ms band the design system asks for. */
  .clayBtn { -webkit-tap-highlight-color:transparent; }
  .clayPress {
    transform-box:fill-box; transform-origin:center;
    transition:transform 140ms cubic-bezier(.34,1.56,.64,1);
  }
  .clayBtn:active .clayPress { transform:scale(0.90); }
  .clayBtn:focus-visible { outline:4px solid #ffce3d; outline-offset:3px; }

  .pickTile { -webkit-tap-highlight-color:transparent; }
  .pickTile .tileArt {
    transform-box:fill-box; transform-origin:center;
    transition:transform 200ms cubic-bezier(.34,1.56,.64,1);
  }
  .pickTile:hover .tileArt { transform:translateY(-12px) scale(1.04); }
  .pickTile:active .tileArt { transform:scale(0.95); }
  .pickTile:focus-visible { outline:4px solid #ffce3d; outline-offset:4px; }

  /* Respect the OS setting. SMIL is not CSS, so the JS also pauses it —
     see setupMotionPreference(). */
  @media (prefers-reduced-motion: reduce) {
    .clayPress, .pickTile .tileArt { transition:none; }
  }
  /* Portrait handling is done in JS (fitStage) by rotating the stage to fill
     the screen, so the game stays playable even with rotation-lock on. */
  #rotate-hint { display:none; }
</style>

<body>

<svg id="stage" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"></svg>

<script>
'use strict';

// ============================================================ HELPERS
const $  = sel => document.querySelector(sel);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const dist  = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

const stage = document.getElementById('stage');

// Convert a client (pointer) coordinate to 1600x900 design space.
// NOT getScreenCTM(): WebKit leaves CSS transforms out of that matrix, so on iOS
// the portrait rotate(90deg) from fitStage() was invisible to it and every touch
// mapped to a frame rotated about the screen centre. getBoundingClientRect sees
// the rotation on every browser, so we undo it by hand.
let stageRot = 0;                                  // 0 or 90, set by fitStage()
function toStage(clientX, clientY) {
  const r = stage.getBoundingClientRect();
  if (!r.width || !r.height) return { x: 0, y: 0 };
  const W = stageRot ? r.height : r.width;         // the stage's own, unrotated box
  const H = stageRot ? r.width : r.height;
  const dx = clientX - (r.left + r.width / 2);     // offset from the stage centre
  const dy = clientY - (r.top + r.height / 2);
  const a = stageRot ? dy : dx;                    // rotate(90deg) maps (a,b) -> (-b,a)
  const b = stageRot ? -dx : dy;
  const s = Math.min(W / 1600, H / 900);           // preserveAspectRatio="xMidYMid meet"
  return { x: 800 + a / s, y: 450 + b / s };       // viewBox centre is the box centre
}

function tween(ms, fn, done) {

    const t = clamp((now - t0) / ms, 0, 1);
    fn(t);

// ============================================================ STATE
const State = {
  muted: false,
  hero: null,              // character id of the kid being played — set by Scenes.pick
  outfit: null,            // filled by dress-up task
  lastCheeredOutfit: null,
  mapSpawn: null,          // where the hero stands when returning to map
};

// ============================================================ AUDIO
// Everything synthesized in WebAudio (no audio files); Taglish phrases via
// on-device speech synthesis. All guarded — silence is always acceptable.
const Audio = (() => {
  let ctx = null, master = null, musicGain = null, musicTimer = null;

  try { State.muted = localStorage.getItem('hero-muted') === '1'; } catch (e) {}

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = State.muted ? 0 : 1;
      master.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.09;
      musicGain.connect(master);
    } catch (e) { ctx = null; }
    return ctx;
  }

  // one short synthesized tone
  function tone({ freq = 440, dur = 0.15, type = 'sine', vol = 0.5, at = 0, slide = 0, out = null }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(out || master);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }

  function noise({ dur = 0.08, vol = 0.5, freq = 800, at = 0 }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start(t0);
  }

  const SFX = {
    knock()   { noise({ dur: 0.09, vol: 0.9, freq: 320 }); noise({ dur: 0.09, vol: 0.9, freq: 300, at: 0.22 }); },
    pop()     { tone({ freq: 500, dur: 0.09, type: 'square', vol: 0.25, slide: 300 }); },
    sparkle() { [1200, 1600, 2100, 2700].forEach((f, i) => tone({ freq: f, dur: 0.12, vol: 0.22, at: i * 0.05 })); },
    boing()   { tone({ freq: 180, dur: 0.28, type: 'triangle', vol: 0.5, slide: 260 }); },
    chime()   { tone({ freq: 880, dur: 0.4, vol: 0.3 }); tone({ freq: 1320, dur: 0.5, vol: 0.2, at: 0.08 }); },
    step()    { noise({ dur: 0.04, vol: 0.25, freq: 700 }); },
    meow()    { tone({ freq: 700, dur: 0.35, type: 'sawtooth', vol: 0.12, slide: -280 }); },
    bounce()  { tone({ freq: 240, dur: 0.14, type: 'triangle', vol: 0.4, slide: -120 }); },
    whee()    { tone({ freq: 400, dur: 0.7, type: 'triangle', vol: 0.35, slide: 900 }); },
    giggle()  { [780, 680, 880, 640].forEach((f, i) => tone({ freq: f, dur: 0.1, type: 'sine', vol: 0.22, at: i * 0.1 })); },
    bell()    { tone({ freq: 660, dur: 0.5, vol: 0.32 }); tone({ freq: 880, dur: 0.6, vol: 0.24, at: 0.14 }); },
    pageflip() { noise({ dur: 0.14, vol: 0.35, freq: 1200 }); },
    coin()    { tone({ freq: 1300, dur: 0.1, vol: 0.28 }); tone({ freq: 1750, dur: 0.14, vol: 0.24, at: 0.07 }); },
    bark()    { tone({ freq: 320, dur: 0.12, type: 'sawtooth', vol: 0.3, slide: -80 }); tone({ freq: 300, dur: 0.12, type: 'sawtooth', vol: 0.28, slide: -70, at: 0.16 }); },
    clap()    { noise({ dur: 0.05, vol: 0.6, freq: 2000 }); },
    munch()   { noise({ dur: 0.06, vol: 0.4, freq: 260 }); noise({ dur: 0.06, vol: 0.38, freq: 220, at: 0.16 }); noise({ dur: 0.06, vol: 0.34, freq: 240, at: 0.32 }); },
    fanfare() {
      [[523, 0], [659, 0.12], [784, 0.24], [1047, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.35, type: 'triangle', vol: 0.35, at }));
      [[523, 0.38], [659, 0.38], [784, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.6, type: 'triangle', vol: 0.2, at }));
    },
  };

  // gentle plucked pentatonic lullaby-ish loop
  const SCALE = [392, 440, 523, 587, 659, 784];
  function scheduleBar() {
    if (!ctx || State.muted) return;
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.75) {
        tone({ freq: pick(SCALE), dur: 0.5, type: 'sine', vol: 0.5, at: i * 0.42, out: musicGain });
      }
      if (i === 0 && Math.random() < 0.5) {
        tone({ freq: pick(SCALE) / 2, dur: 0.9, type: 'triangle', vol: 0.25, at: 0, out: musicGain });
      }
    }
  }

  let voice = null, voiceLoaded = false;
  function pickVoice() {
    if (voiceLoaded) return;
    try {
      const vs = speechSynthesis.getVoices();
      if (!vs.length) return;
      voice = vs.find(v => /^(fil|tl)/i.test(v.lang)) || null;
      voiceLoaded = true;
    } catch (e) {}
  }
  try { speechSynthesis.addEventListener('voiceschanged', pickVoice); } catch (e) {}

  return {
    unlock() {
      const c = ensureCtx();
      try { if (c && c.state === 'suspended') c.resume(); } catch (e) {}
      try { speechSynthesis.resume(); } catch (e) {}
      pickVoice();
    },
    sfx(name) {
      if (State.muted || !ensureCtx()) return;
      try { SFX[name] && SFX[name](); } catch (e) {}
    },
    // a single plucked note — the piano toy plays these in sequence
    note(freq, dur = 0.45) {
      if (State.muted || !ensureCtx()) return;
      try { tone({ freq, dur, type: 'triangle', vol: 0.32 }); } catch (e) {}
    },
    say(text) {
      if (State.muted) return;
      try {
        pickVoice();
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.pitch = 1.2; u.volume = 1;
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      } catch (e) {}
    },
    music: {
      start() {
        if (musicTimer || !ensureCtx()) return;
        scheduleBar();
        musicTimer = setInterval(scheduleBar, 1700);
      },
      stop() { clearInterval(musicTimer); musicTimer = null; },
    },
    // a gentle 8-note hymn phrase, plays once (safe to retrigger)
    hymn() {
      if (State.muted || !ensureCtx()) return;
      try {
        [523, 659, 784, 880, 784, 659, 587, 523].forEach((f, i) =>
          tone({ freq: f, dur: 0.5, type: 'triangle', vol: 0.24, at: i * 0.5, out: musicGain }));
      } catch (e) {}
    },
    setMuted(b) {
      State.muted = b;
      try { localStorage.setItem('hero-muted', b ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = b ? 0 : 1;
      if (b) { try { speechSynthesis.cancel(); } catch (e) {} }
    },
  };
})();

// ============================================================ ICONS
// Line icons on a 24x24 grid, one stroke weight, one family. The controls used
// to be emoji (volume, plate, house, hand), which render differently on every
// device, cannot be recoloured, and are the fastest way to make a UI look
// thrown together.
const ICON_PATHS = {
  volumeOn: ['M11 5 6 9H2v6h4l5 4V5z', 'M15.5 8.5a5 5 0 0 1 0 7', 'M19 5a10 10 0 0 1 0 14'],
  volumeOff: ['M11 5 6 9H2v6h4l5 4V5z', 'm22 9-6 6', 'm16 9 6 6'],
  food: ['M3 2v7a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2V2', 'M5.5 2v20', 'M20 2a4 4 0 0 0-4 4v7h4', 'M20 2v20'],
  close: ['M18 6 6 18', 'M6 6l12 12'],
  home: ['m3 10 9-7 9 7v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z', 'M9 22V13h6v9'],
  swap: ['M3 12a9 9 0 0 1 15-6.7L21 8', 'M21 3v5h-5', 'M21 12a9 9 0 0 1-15 6.7L3 16', 'M3 21v-5h5'],
  back: ['M19 12H5', 'm12 19-7-7 7-7'],
  play: ['M7 4.5v15l12-7.5z'],
  highFive: ['M18 11V6a2 2 0 0 0-4 0', 'M14 10V4a2 2 0 0 0-4 0v2', 'M10 10.5V6a2 2 0 0 0-4 0v8',
             'M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.9-6-2.3l-3.6-3.6a2 2 0 0 1 2.8-2.8L7 15'],
};
// The two solid glyphs. A heart reads instantly to a toddler; the play triangle
// is a filled shape by convention.
const ICON_HEART = 'M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.8 0-3 .5-4.5 2-1.5-1.5-2.7-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7Z';

function icon(name, x, y, size = 48, color = '#5a5470', weight = 2.1) {
  const k = size / 24;
  const wrap = body => `<g transform="translate(${x} ${y}) scale(${k}) translate(-12 -12)">${body}</g>`;
  if (name === 'hug') return wrap(`<path d="${ICON_HEART}" fill="${color}"/>`);
  if (name === 'play') return wrap(`<path d="${ICON_PATHS.play[0]}" fill="${color}"/>`);
  return wrap(`<g fill="none" stroke="${color}" stroke-width="${weight}" stroke-linecap="round"
    stroke-linejoin="round">${ICON_PATHS[name].map(d => `<path d="${d}"/>`).join('')}</g>`);
}

// ---- Claymorphism: the style the design system picked for a children's game.
// Soft 3D, chunky, toy-like — a thick light rim, an outer drop shadow and an
// inner highlight, so a button looks like something you could press.
// `.clayPress` is what the CSS scales down on :active, giving every control the
// tactile squash a toy should have.
function clayButton(id, x, y, r, inner, o = {}) {
  return `<g id="${id}" class="clayBtn" style="cursor:pointer" role="button" aria-label="${o.label || id}" tabindex="0">
    <g class="clayPress">
      <circle cx="${x}" cy="${y}" r="${r}" fill="${o.fill || '#ffffff'}" filter="url(#clayDrop)"/>
      <circle cx="${x}" cy="${y}" r="${r}" fill="url(#clayHi)"/>
      <circle cx="${x}" cy="${y}" r="${r - 2}" fill="none" stroke="#fff" stroke-width="4" opacity="0.7"/>
      ${inner}
    </g>
  </g>`;
}

// Mute button helper — scenes render this and call wireMuteButton().
function muteButtonSVG() {
  return clayButton('muteBtn', 1520, 84, 52,
    `<g id="muteIcon">${icon(State.muted ? 'volumeOff' : 'volumeOn', 1520, 84, 44, '#7a6a86')}</g>`,
    { label: 'Sound on or off' });
}
function wireMuteButton() {
  const btn = $('#muteBtn');
  if (!btn) return;
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    Audio.setMuted(!State.muted);
    $('#muteIcon').innerHTML = icon(State.muted ? 'volumeOff' : 'volumeOn', 1520, 84, 44, '#7a6a86');
    if (!State.muted) Audio.sfx('pop');
  });
}

// High-contrast label: bold text with a thick outline so it reads on any background.
function bigLabel(x, y, str, o = {}) {
  const size = o.size || 34;
  return `<text x="${x}" y="${y}" text-anchor="${o.anchor || 'middle'}" font-size="${size}"
    font-weight="${o.weight || 'bold'}" font-family="'Fredoka',system-ui,sans-serif"
    fill="${o.fill || '#fff'}" stroke="${o.stroke || '#3a3a42'}" stroke-width="${Math.max(3, size / 5)}"
    paint-order="stroke" stroke-linejoin="round">${str}</text>`;
}

// ============================================================ ART — character rig
// Coordinate system per character: origin at center of feet, head top ≈ y=-330.
// Same face geometry for everyone; female full-hair styles overlay a hair ring
// with a skin "face window" so features sit at identical coordinates.

const FACE = { eyeY: -256, eyeX: 24, mouthY: -230, browY: -278, blushY: -238, blushX: 40 };

function hairBack(spec) {
  const hc = spec.hairColor;
  switch (spec.hair) {
    case 'pigtails':
      return `<circle cx="-80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="-80" cy="-260" r="7" fill="#ffb0c8"/>
              <circle cx="80" cy="-260" r="7" fill="#ffb0c8"/>`;
    case 'longStraight':
      return `<path d="M -70 -270 Q -78 -160 -64 -120 L -30 -130 L -40 -230 L 40 -230 L 30 -130 L 64 -120 Q 78 -160 70 -270 Z" fill="${hc}"/>`;
    case 'longWavy':
      return `<path d="M -70 -270 Q -84 -200 -70 -170 Q -80 -140 -62 -112 L -30 -128 L -40 -230 L 40 -230 L 30 -128 L 62 -112 Q 80 -140 70 -170 Q 84 -200 70 -270 Z" fill="${hc}"/>
              <circle cx="-64" cy="-118" r="14" fill="${hc}"/><circle cx="64" cy="-118" r="14" fill="${hc}"/>`;
    case 'shoulderBob':
      return `<path d="M -72 -270 Q -80 -190 -62 -168 Q -30 -152 0 -152 Q 30 -152 62 -168 Q 80 -190 72 -270 Z" fill="${hc}"/>`;
    case 'ponytail':
      return `<circle cx="62" cy="-300" r="20" fill="${hc}"/>
              <path d="M 62 -300 Q 92 -260 78 -190 Q 70 -168 60 -186 Q 70 -250 52 -290 Z" fill="${hc}"/>
              <circle cx="58" cy="-296" r="7" fill="#e8b13a"/>`;
    default: return '';
  }
}

function hairFront(spec) {
  const hc = spec.hairColor;
  const fullHair = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'].includes(spec.hair);
  if (fullHair) {
    // hair ring + face window (fringe all around)
    return `<circle cx="0" cy="-258" r="71" fill="${hc}"/>
            <ellipse cx="0" cy="-244" rx="54" ry="50" fill="${spec.skin}"/>`;
  }
  switch (spec.hair) {
    case 'shortSpiky':
      return `<path d="M -64 -268 A 66 66 0 0 1 64 -268 L 62 -256 Q 44 -270 40 -262 Q 20 -278 12 -266 Q -6 -280 -16 -266 Q -36 -276 -44 -262 Q -58 -268 -62 -254 Z" fill="${hc}"/>
              <path d="M -50 -308 L -40 -326 L -32 -308 Z" fill="${hc}"/>
              <path d="M -18 -316 L -8 -334 L 0 -314 Z" fill="${hc}"/>
              <path d="M 14 -316 L 24 -332 L 32 -312 Z" fill="${hc}"/>
              <path d="M 42 -306 L 52 -320 L 58 -302 Z" fill="${hc}"/>`;
    case 'shortNeat':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -252 Q 30 -272 -10 -268 Q -46 -264 -64 -248 Z" fill="${hc}"/>`;
    case 'swept':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -240 Q 56 -262 34 -266 Q 54 -280 30 -290 Q -6 -302 -38 -288 Q -62 -276 -64 -246 Z" fill="${hc}"/>
              <path d="M -60 -282 Q -20 -306 24 -294 Q 44 -288 50 -276 Q 20 -290 -16 -284 Q -44 -278 -58 -266 Z" fill="${hc}"/>`;
    default: return '';
  }
}

function drawGlasses(spec) {
  if (!spec.glasses) return '';
  const { eyeX, eyeY } = FACE;
  if (spec.glasses === 'round')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <circle cx="-${eyeX}" cy="${eyeY}" r="19"/><circle cx="${eyeX}" cy="${eyeY}" r="19"/>
      <line x1="-5" y1="${eyeY - 4}" x2="5" y2="${eyeY - 4}"/></g>`;
  if (spec.glasses === 'rect')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <rect x="-${eyeX + 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <rect x="${eyeX - 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}"/></g>`;
  // sun
  return `<g><rect x="-${eyeX + 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <rect x="${eyeX - 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}" stroke="#2c2c34" stroke-width="5"/>
    <circle cx="-${eyeX + 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/><circle cx="${eyeX - 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/></g>`;
}

function drawMouth(spec) {
  const y = FACE.mouthY;
  switch (spec.smile) {
    case 'open':
      return `<path d="M -20 ${y - 4} Q 0 ${y + 26} 20 ${y - 4} Q 0 ${y + 4} -20 ${y - 4} Z" fill="#a04a52"/>
              <ellipse cx="0" cy="${y + 12}" rx="9" ry="5" fill="#ff8fa0"/>`;
    case 'braces': {
      return `<path d="M -18 ${y - 4} Q 0 ${y + 22} 18 ${y - 4} Q 0 ${y + 2} -18 ${y - 4} Z" fill="#a04a52"/>
              <path d="M -13 ${y - 1} Q 0 ${y + 7} 13 ${y - 1}" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path d="M -13 ${y - 1} Q 0 ${y + 7} 13 ${y - 1}" stroke="#9ad1e8" stroke-width="2.5" fill="none" stroke-dasharray="3 4"/>`;
    }
    case 'grin':
      return `<path d="M -22 ${y - 8} Q 0 ${y + 16} 22 ${y - 8}" stroke="#8c4a4a" stroke-width="7" fill="none" stroke-linecap="round"/>`;
    case 'soft':
    default: {
      const lips = spec.lips
        ? `<path d="M -14 ${y - 2} Q -7 ${y - 8} 0 ${y - 2} Q 7 ${y - 8} 14 ${y - 2} Q 7 ${y + 10} 0 ${y + 8} Q -7 ${y + 10} -14 ${y - 2} Z" fill="${spec.lips}"/>`
        : `<path d="M -13 ${y - 2} Q 0 ${y + 10} 13 ${y - 2}" stroke="#8c4a4a" stroke-width="6" fill="none" stroke-linecap="round"/>`;
      return lips;
    }
  }
}

        <path d="M -21 -12 L 21 -12 L 26 0 L -26 0 Z" fill="#ffd94d"/>
        <circle cx="0" cy="-58" r="9" fill="#ff8fb5"/></g>`;
    case 'cap': // baseball cap, brim to the character's right
      return `<g transform="translate(0,-310)">
        <path d="M -58 4 Q -58 -52 0 -52 Q 58 -52 58 4 Z" fill="#2e3350"/>
        <path d="M 0 -52 Q 34 -50 50 -22 Q 26 -30 0 -30 Z" fill="#3a4066"/>

        <circle cx="18" cy="-30" r="13" fill="#f2c94c" stroke="#e0932c" stroke-width="3"/></g>`;
    case 'bucket': // bucket hat
      return `<g transform="translate(0,-306)">

function drawTop(spec) {
  const t = spec.top, c = t.color;
  switch (t.type) {
    case 'dress': {
      const collar = t.collar ? `
        <path d="M -30 -190 L 0 -170 L -38 -158 Q -44 -176 -30 -190 Z" fill="${t.collar}"/>
        <path d="M 30 -190 L 0 -170 L 38 -158 Q 44 -176 30 -190 Z" fill="${t.collar}"/>
        <circle cx="0" cy="-170" r="8" fill="${t.collar}" stroke="#e8d8e0" stroke-width="2"/>` : '';
      return `<path d="M -38 -195 L 38 -195 L 64 -58 Q 0 -40 -64 -58 Z" fill="${c}"/>
              <circle cx="0" cy="-140" r="4" fill="#fff" opacity="0.8"/>
              <circle cx="0" cy="-115" r="4" fill="#fff" opacity="0.8"/>
              ${collar}`;
    }
    case 'baroSaya': // Filipiniana: white butterfly-sleeve top + colored skirt
      return `<path d="M -38 -195 L 38 -195 L 44 -120 L -44 -120 Z" fill="#fffaf2"/>
              <path d="M -38 -195 Q -70 -200 -66 -168 Q -52 -160 -40 -172 Z" fill="#fffaf2"/>

              <path d="M -60 -66 Q 0 -50 60 -66" stroke="#f2c94c" stroke-width="5" fill="none"/>`;
    case 'gown': { // princess / party ball gown: fitted bodice + wide sparkly skirt
      const trim = t.collar || '#ffe9a8';
      const sparkle = [[-34, -92], [24, -74], [-8, -54], [44, -108], [-52, -58], [12, -104]]
        .map(([x, y]) => `<path d="M ${x} ${y - 6} L ${x + 2} ${y - 1} L ${x + 7} ${y} L ${x + 2} ${y + 1} L ${x} ${y + 6} L ${x - 2} ${y + 1} L ${x - 7} ${y} L ${x - 2} ${y - 1} Z" fill="#fff" opacity="0.85"/>`).join('');
      return `<path d="M -40 -196 L 40 -196 L 100 -18 Q 0 6 -100 -18 Z" fill="${c}"/>
              <path d="M -40 -196 L 40 -196 L 46 -150 Q 0 -140 -46 -150 Z" fill="${trim}"/>
              <path d="M -100 -18 Q 0 6 100 -18" stroke="${trim}" stroke-width="6" fill="none"/>
              <path d="M -46 -150 Q 0 -122 46 -150" stroke="${trim}" stroke-width="4" fill="none"/>
              <path d="M -30 -188 L 0 -168 L -38 -156 Q -44 -176 -30 -188 Z" fill="${trim}"/>

    }
    case 'tutu': { // ballerina: leotard bodice + puffy tutu skirt

    case 'blouse':
      return `<rect x="-48" y="-196" width="96" height="102" rx="20" fill="${c}"/>

              <path d="M -14 -196 L 0 -180 L -18 -172 Z" fill="#eeeef2"/>

              <line x1="34" y1="-178" x2="24" y2="-196" stroke="${c}" stroke-width="7"/>`;
    case 'openShirt':
      return `<rect x="-30" y="-192" width="60" height="96" rx="12" fill="#f4f4f6"/>
              <path d="M -48 -196 L -18 -192 L -26 -94 L -50 -100 Z" fill="${c}"/>
              <path d="M 48 -196 L 18 -192 L 26 -94 L 50 -100 Z" fill="${c}"/>
              <path d="M -48 -186 L -78 -158 L -62 -136 L -46 -156 Z" fill="${c}"/>
              <path d="M 48 -186 L 78 -158 L 62 -136 L 46 -156 Z" fill="${c}"/>`;
    default: return `<rect x="-46" y="-196" width="92" height="100" rx="20" fill="${c}"/>`;

}

function drawBottom(spec) {
  const isDress = ['dress', 'baroSaya', 'gown', 'uniform', 'tutu'].includes(spec.top.type);
  if (isDress || !spec.bottom) return '';
  const b = spec.bottom, c = b.color;
  switch (b.type) {
    case 'shorts':
      return `<path d="M -44 -100 L 44 -100 L 46 -52 L 8 -52 L 0 -74 L -8 -52 L -46 -52 Z" fill="${c}"/>`;
    case 'pants':
      return `<path d="M -44 -100 L 44 -100 L 40 -12 L 10 -12 L 4 -72 L -4 -72 L -10 -12 L -40 -12 Z" fill="${c}"/>`;
    case 'skirt':
      return `<path d="M -44 -100 L 44 -100 L 56 -50 Q 0 -38 -56 -50 Z" fill="${c}"/>`;
    default: return '';
  }
}

function drawShoes(spec) {
  const s = spec.shoes, c = s.color;

    ? `<rect x="-30" y="-46" width="20" height="26" rx="6" fill="#fff"/>

  switch (s.type) {
    case 'maryjane':
      return socks + `<g fill="${c}">
        <path d="M -34 -20 Q -20 -28 -8 -20 L -6 -2 L -36 -2 Z"/>
        <path d="M 34 -20 Q 20 -28 8 -20 L 6 -2 L 36 -2 Z"/></g>
        <line x1="-32" y1="-16" x2="-10" y2="-16" stroke="#fff" stroke-width="3"/>
        <line x1="32" y1="-16" x2="10" y2="-16" stroke="#fff" stroke-width="3"/>`;
    case 'sneakers':
      return socks + `<g>
        <path d="M -36 -22 Q -18 -30 -6 -20 L -4 -2 L -38 -2 Z" fill="#fff"/>

        <path d="M -38 -8 L -4 -8 L -4 -2 L -38 -2 Z" fill="${c}"/>
        <path d="M 38 -8 L 4 -8 L 4 -2 L 38 -2 Z" fill="${c}"/></g>`;

      return `<g fill="${c}">
        <ellipse cx="-20" cy="-6" rx="20" ry="8"/><ellipse cx="20" cy="-6" rx="20" ry="8"/></g>
        <path d="M -28 -8 L -20 -16 L -12 -8" stroke="#fff" stroke-width="4" fill="none"/>
        <path d="M 12 -8 L 20 -16 L 28 -8" stroke="#fff" stroke-width="4" fill="none"/>`;
    case 'sandals':

        <ellipse cx="-20" cy="-5" rx="19" ry="7"/><ellipse cx="20" cy="-5" rx="19" ry="7"/>
        <line x1="-30" y1="-10" x2="-10" y2="-10" stroke="${c}" stroke-width="4"/>
        <line x1="10" y1="-10" x2="30" y2="-10" stroke="${c}" stroke-width="4"/></g>`;
    case 'party':

function drawArms(spec) {
  const skin = spec.skin;
  const sleeveless = ['cami', 'dress', 'baroSaya'].includes(spec.top.type);
  const sleeve = sleeveless ? '' : null; // sleeves already drawn by top
  const watch = spec.watch
    ? `<rect x="-76" y="-118" width="16" height="10" rx="4" fill="${spec.watch === 'gold' ? '#e8b13a' : '#3a3a44'}"/>`
    : '';
  const necklace = spec.necklace
    ? `<path d="M -18 -192 Q 0 -176 18 -192" stroke="#e8b13a" stroke-width="3" fill="none"/>
       <circle cx="0" cy="-178" r="4" fill="#f2c94c"/>` : '';
  return `
    <g class="armL">
      <line x1="-50" y1="-180" x2="-68" y2="-104" stroke="${skin}" stroke-width="20" stroke-linecap="round"/>
      <circle cx="-68" cy="-100" r="12" fill="${skin}"/>
      ${watch}
    </g>
    <g class="armR">
      <line x1="50" y1="-180" x2="68" y2="-104" stroke="${skin}" stroke-width="20" stroke-linecap="round"/>
      <circle cx="68" cy="-100" r="12" fill="${skin}"/>
    </g>
    ${necklace}`;
}

let _faceUid = 0;
const FULL_HAIR = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'];

// Photo face: the real face clipped into the head, cartoon hair around it.
// Full-hair styles: hair ring first, photo fills the face window.
// Short-hair styles: photo first, fringe overlaps the forehead edge.
function photoFaceLayer(spec) {
  const photo = FACES[spec.face];
  const uid = ++_faceUid;
  const full = FULL_HAIR.includes(spec.hair);
  // Short-hair crops already show the person's real hair, so no cartoon fringe:
  // the photo just fills (almost) the whole head circle.
  const e = full ? { cy: -244, rx: 54, ry: 50 } : { cy: -251, rx: 58, ry: 63 };
  const img = `
      <clipPath id="fclip${uid}"><ellipse cx="0" cy="${e.cy}" rx="${e.rx}" ry="${e.ry}"/></clipPath>
      <image href="${photo}" xlink:href="${photo}" x="${-e.rx - 4}" y="${e.cy - e.ry - 4}"
        width="${e.rx * 2 + 8}" height="${e.ry * 2 + 8}"
        preserveAspectRatio="xMidYMid slice" clip-path="url(#fclip${uid})"/>`;
  return full ? hairFront(spec) + img : img;
}

function cartoonFaceLayer(spec) {
  const { eyeX, eyeY, browY, blushX, blushY } = FACE;
  return `
      ${hairFront(spec)}
      <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <path d="M -${eyeX + 12} ${browY} Q -${eyeX} ${browY - 7} -${eyeX - 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M ${eyeX - 12} ${browY} Q ${eyeX} ${browY - 7} ${eyeX + 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      <ellipse cx="${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      ${drawMouth(spec)}
      ${drawGlasses(spec)}`;
}

function buildCharacter(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1, facing = 1, idle = false, cls = '' } = opts;
  const earrings = spec.earrings
    ? `<circle cx="-58" cy="-226" r="5" fill="#f2c94c"/><circle cx="58" cy="-226" r="5" fill="#f2c94c"/>` : '';
  const bob = idle
    ? `<animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>` : '';
  const face = FACES[spec.face] ? photoFaceLayer(spec) : cartoonFaceLayer(spec);
  const shadow = opts.shadow === false ? ''
    : `<ellipse cx="0" cy="-6" rx="54" ry="15" fill="#2a1a3a" opacity="0.17"/>`;
  return `
  <g class="${cls}" transform="translate(${x} ${y}) scale(${scale * facing} ${scale})">
    ${shadow}
    <g>${bob}
      ${hairBack(spec)}
      <!-- legs -->
      <rect x="-30" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      <rect x="10" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      ${drawShoes(spec)}
      ${drawBottom(spec)}
      ${drawArms(spec)}
      ${drawTop(spec)}
      <!-- neck + head -->
      <rect x="-12" y="-216" width="24" height="26" fill="${spec.skin}"/>
      <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
      ${face}
      ${earrings}
      ${drawHat(spec)}
    </g>
  </g>`;
}

// Head-only portrait for house signboards.
function buildFace(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1 } = opts;
  const { eyeX, eyeY } = FACE;
  const photo = FACES[spec.face];
  if (photo) {
    const uid = ++_faceUid;
    return `
  <g transform="translate(${x} ${y}) scale(${scale})">
    <circle r="72" fill="#fff" stroke="#e0d0b8" stroke-width="6"/>
    <clipPath id="pclip${uid}"><circle r="66"/></clipPath>
    <image href="${photo}" xlink:href="${photo}" x="-66" y="-66" width="132" height="132"
      preserveAspectRatio="xMidYMid slice" clip-path="url(#pclip${uid})"/>
  </g>`;
  }
  return `
  <g transform="translate(${x} ${y + 252 * scale}) scale(${scale})">
    ${hairBack(spec)}
    <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
    ${hairFront(spec)}
    <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <ellipse cx="-${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    <ellipse cx="${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    ${drawMouth(spec)}
    ${drawGlasses(spec)}
    ${drawHat(spec)}
  </g>`;
}

// Wave animation: rotate the right arm up and back a few times.
function waveCharacter(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(1200, t => {
    const a = -70 * Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t * 0.2);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

// Raise and hold the right arm (for a high-five).
function raiseArm(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(900, t => {
    const a = -100 * Math.min(1, t * 3) * (t > 0.7 ? (1 - (t - 0.7) / 0.3) : 1);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

// Little floaters (hearts or stars) rising from a point, drawn into `layer`.
function floaters(layer, x, y, kind) {
  if (!layer) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  layer.appendChild(g);
  const heart = c => `<path d="M 0 8 C -12 -2 -9 -14 -2 -9 Q 0 -7 0 -4 Q 0 -7 2 -9 C 9 -14 12 -2 0 8 Z" fill="${c}"/>`;
  const star = c => `<path d="M 0 -11 L 3 -3 L 11 -3 L 4 2 L 7 10 L 0 5 L -7 10 L -4 2 L -11 -3 L -3 -3 Z" fill="${c}"/>`;
  const cols = kind === 'heart' ? ['#ff8fb5', '#f47a5e', '#ff5a8a'] : ['#ffd94d', '#ffe066', '#f2c94c'];
  const bits = Array.from({ length: 7 }, () => ({
    x: x + rand(-50, 50), y: y + rand(-10, 10),
    vx: rand(-40, 40), vy: rand(-150, -90), s: rand(1.4, 2.6), c: pick(cols), rot: rand(-30, 30),
  }));
  tween(1200, t => {
    g.innerHTML = bits.map(b => `<g transform="translate(${b.x + b.vx * t} ${b.y + b.vy * t}) scale(${b.s}) rotate(${b.rot})" opacity="${1 - t}">${
      kind === 'heart' ? heart(b.c) : star(b.c)}</g>`).join('');
  }, () => g.remove());
}

// Auto hug: two characters lean into each other with a giggle + hearts.
// Used when one character is dragged and dropped next to another.
function hugTogether(personEl, heroEl, px, py, layer) {
  Audio.sfx('giggle');
  [[personEl, -8], [heroEl, 8]].forEach(([el, dir]) => {
    if (!el) return;
    const base = el.getAttribute('transform') || '';
    tween(800, t => el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI) * dir})`),
      () => el.setAttribute('transform', base));
  });
  if (layer) floaters(layer, px, py - 200, 'heart');
}

// Hug + high-five action buttons above a person the hero has tapped.
function showPersonActions(personEl, heroEl, px, py, layer) {
  if (!layer) return;
  layer.querySelectorAll('.pAct').forEach(n => n.remove());
  const by = py - 320;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'pAct');
  g.innerHTML = `
    <g class="hugBtn clayBtn" transform="translate(${px - 66} ${by})" style="cursor:pointer" role="button" aria-label="Hug">
      <g class="clayPress">
        <circle r="50" fill="#fff" filter="url(#clayDrop)"/>
        <circle r="50" fill="none" stroke="#ff8fb5" stroke-width="6"/>
        ${icon('hug', 0, 0, 46, '#ff5f92')}
      </g>
    </g>
    <g class="hiBtn clayBtn" transform="translate(${px + 66} ${by})" style="cursor:pointer" role="button" aria-label="High five">
      <g class="clayPress">
        <circle r="50" fill="#fff" filter="url(#clayDrop)"/>
        <circle r="50" fill="none" stroke="#5bb8e8" stroke-width="6"/>
        ${icon('highFive', 0, 0, 44, '#2f8fc4', 2.3)}
      </g>
    </g>`;
  layer.appendChild(g);
  const auto = setTimeout(() => g.remove(), 5000);
  g.querySelector('.hugBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); clearTimeout(auto); g.remove();
    Audio.sfx('giggle');
    [[personEl, -8], [heroEl, 8]].forEach(([el, dir]) => {
      if (!el) return;
      const base = el.getAttribute('transform') || '';
      tween(800, t => el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI) * dir})`),
        () => el.setAttribute('transform', base));
    });
    floaters(layer, px, py - 200, 'heart');
  });
  g.querySelector('.hiBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); clearTimeout(auto); g.remove();
    if (personEl) raiseArm(personEl);
    if (heroEl) raiseArm(heroEl);
    Audio.sfx('clap');
    floaters(layer, px, py - 180, 'star');
  });
}

// ============================================================ DRAG MOVEMENT
// Every character is picked up and dragged. A quick tap (no drag) fires the
// character's reaction. makeWalker keeps its old name + API so every scene is
// untouched, but movement is now drag-based: walkTo/approach are instant (the
// interaction just happens where the character already is).
function makeWalker(cfg) {
  const pos = { x: cfg.x, y: cfg.y, facing: cfg.facing || 1 };
  const b = cfg.bounds;
  let destroyed = false;

  cfg.g.innerHTML = buildCharacter(cfg.spec, {});

  function place(bobY = 0) {
    const s = cfg.scaleFn ? cfg.scaleFn(pos.y) : 1;
    setDepth(cfg.g, pos.y);
    cfg.g.setAttribute('transform', `translate(${pos.x} ${pos.y + bobY}) scale(${s * pos.facing} ${s})`);
    if (cfg.onMove) cfg.onMove(pos);
  }

  // Instant reposition — used by door-entry + programmatic nudges.
  function walkTo(tx, ty, done) {
    tx = clamp(tx, b.minX, b.maxX);
    ty = clamp(ty, b.minY, b.maxY);
    if (tx !== pos.x) pos.facing = tx < pos.x ? -1 : 1;
    pos.x = tx; pos.y = ty; place();
    if (done) done();
  }
  // No more walking: whatever the hero was going to do, they do it right here.
  function approach(tx, ty, reach, done) { if (done) done(); }

  // Drag the hero around the scene.
  charDrag(cfg.g, {
    getPos: () => pos,
    move: (x, y) => { pos.x = clamp(x, b.minX, b.maxX); pos.y = clamp(y, b.minY, b.maxY); place(); },
    toLocal: cfg.toLocal,
    onTap: cfg.onTap,
    onDrop: p => {
      sortDepth(cfg.g.parentNode);
      if (cfg.onDrop) cfg.onDrop(p);
    },
  });

  // Ground taps used to walk the hero; now empty ground pans the camera (world only).
  function attachGround(el) {
    if (cfg.onPan) el.addEventListener('pointerdown', cfg.onPan);
  }

  place();
  return {
    pos, place, walkTo, approach, attachGround,
    stop() {}, destroy() { destroyed = true; },
  };
}

// Shared pointer-drag for a character group. A tap (no real movement) calls
// onTap; a drag calls move(x,y) with the target in the element's own space and
// onDrop(pos) on release. `toLocal` maps stage coords into that space.
function charDrag(el, opts) {
  el.style.cursor = 'grab';
  el.addEventListener('pointerdown', e => {
    if (App.locked) return;
    e.stopPropagation();
    const toL = opts.toLocal || (p => p);
    const grab = opts.getPos();
    const start = toL(toStage(e.clientX, e.clientY));
    const off = { x: grab.x - start.x, y: grab.y - start.y };
    let dragging = false;
    if (el.parentNode) el.parentNode.appendChild(el); // raise to front
    const move = ev => {
      const p = toL(toStage(ev.clientX, ev.clientY));
      const tx = p.x + off.x, ty = p.y + off.y;
      if (!dragging && dist(tx, ty, grab.x, grab.y) > 12) { dragging = true; Audio.sfx('pop'); }
      if (dragging) opts.move(tx, ty);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      if (!dragging) { if (opts.onTap) opts.onTap(); }
      else { Audio.sfx(opts.dropSfx || 'boing'); if (opts.onDrop) opts.onDrop(opts.getPos()); }
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

// Make a statically-drawn character group (position baked into its art) draggable
// by translating the group. Returns a live {x,y} of its current position.
function makeCharMovable(el, base, bounds, opts = {}) {
  const pos = { x: base.x, y: base.y };
  setDepth(el, base.y);
  charDrag(el, {
    getPos: () => pos,
    move: (x, y) => {
      pos.x = clamp(x, bounds.minX, bounds.maxX);
      pos.y = clamp(y, bounds.minY, bounds.maxY);
      setDepth(el, pos.y);
      el.setAttribute('transform', `translate(${pos.x - base.x} ${pos.y - base.y})`);
    },
    onTap: opts.onTap,
    onDrop: p => {
      sortDepth(el.parentNode);
      if (opts.onDrop) opts.onDrop(p);
    },
    dropSfx: opts.dropSfx,
  });
  return pos;
}

// Tap the food button anywhere the hero is; the tray opens; tap a food and it flies
// to their mouth with a happy munch. Free play — nothing to score.
const SVGNS = 'http://www.w3.org/2000/svg';
const FOODS = [
  { emoji: '🍚', name: 'Kanin' },
  { emoji: '🍗', name: 'Adobo' },

  { emoji: '🥭', name: 'Mangga' },

  { emoji: '🍦', name: 'Sorbetes' },
  { emoji: '🍜', name: 'Lugaw' },

  { emoji: '🧃', name: 'Juice' },

const YUMS = ['Sarap!', 'Mmm, masarap!', 'Yum yum!', 'Ang sarap!', 'Busog na!'];

// The hero's character group in whatever scene is on screen.
function heroGroup() { return $('#heroWalk') || $('#heroWalkH') || $('#heroWalkP'); }

// Add the food button + tray to the current scene. getHero()->walker, camX()->number.
function installFoodTray(getHero, camX = () => 0) {
  const btn = document.createElementNS(SVGNS, 'g');
  btn.setAttribute('id', 'foodBtn');
  btn.setAttribute('class', 'clayBtn');
  btn.setAttribute('style', 'cursor:pointer');
  btn.setAttribute('role', 'button');
  btn.setAttribute('aria-label', 'Food');
  btn.innerHTML = `<g class="clayPress">
    <circle cx="92" cy="92" r="56" fill="#fff" filter="url(#clayDrop)"/>
    <circle cx="92" cy="92" r="56" fill="url(#clayHi)"/>
    <circle cx="92" cy="92" r="54" fill="none" stroke="#fff" stroke-width="4" opacity="0.7"/>
    ${icon('food', 92, 92, 46, '#7a6a86')}
  </g>`;
  stage.appendChild(btn);
  let tray = null;
  const close = () => { if (tray) { tray.remove(); tray = null; } };
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (App.locked) return;
    if (tray) { close(); return; }
    Audio.sfx('pop');
    const cols = 5, cw = 260, x0 = 280, y0 = 320, rh = 168;
    const rows = Math.ceil(FOODS.length / cols);
    const items = FOODS.map((f, i) => {
      const cx = x0 + (i % cols) * cw, cy = y0 + Math.floor(i / cols) * rh;
      return `<g class="foodItem" data-i="${i}" style="cursor:pointer">
        <circle cx="${cx}" cy="${cy}" r="60" fill="#fffaf2" stroke="#ffd94d" stroke-width="6"/>
        <text x="${cx}" y="${cy + 22}" text-anchor="middle" font-size="62">${f.emoji}</text>
        <text x="${cx}" y="${cy + 90}" text-anchor="middle" font-size="22" font-family="'Fredoka',system-ui,sans-serif" fill="#6a4a2a">${f.name}</text>
      </g>`;
    }).join('');
    tray = document.createElementNS(SVGNS, 'g');
    tray.setAttribute('id', 'foodTray');
    tray.innerHTML = `
      <rect class="trayBg" width="1600" height="900" fill="#2a1a3a" opacity="0.45"/>
      <rect x="150" y="180" width="1300" height="${rows * rh + 120}" rx="40" fill="#fff" filter="url(#clayDrop)"/>
      <rect x="150" y="180" width="1300" height="${rows * rh + 120}" rx="40" fill="none" stroke="#ffe0ea" stroke-width="6"/>
      <text x="800" y="262" text-anchor="middle" font-size="46" font-weight="600" fill="#e0567f">Kain tayo, ${heroLabel()}!</text>
      ${items}
      <g class="trayClose clayBtn" style="cursor:pointer" role="button" aria-label="Close">
        <g class="clayPress">
          <circle cx="1390" cy="238" r="38" fill="#ffe0ea"/>
          ${icon('close', 1390, 238, 34, '#c4436c', 2.6)}
        </g>
      </g>`;
    stage.appendChild(tray);
    tray.querySelector('.trayBg').addEventListener('pointerdown', ev => { ev.stopPropagation(); close(); });
    tray.querySelector('.trayClose').addEventListener('pointerdown', ev => { ev.stopPropagation(); close(); });
    tray.querySelectorAll('.foodItem').forEach(it => {
      it.addEventListener('pointerdown', ev => {
        ev.stopPropagation();
        const f = FOODS[+it.dataset.i];
        close();
        heroEat(f, getHero(), camX());
      });
    });
  });
}

// Fly the food to the hero, then a squash-chew + hearts + Taglish "Sarap!".
function heroEat(food, hero, camX) {
  const eg = heroGroup();
  if (!hero || !eg) return;
  const s = hero.pos && typeof hero.pos.y === 'number' ? (0.5 + (hero.pos.y - 630) / 235 * 0.2) : 0.6;
  const sx = hero.pos.x - camX;
  const sy = hero.pos.y - 190 * Math.max(0.42, Math.min(0.8, s));
  const fx = $('#fxLayer') || stage;
  const food$ = document.createElementNS(SVGNS, 'text');
  food$.setAttribute('text-anchor', 'middle');
  food$.textContent = food.emoji;
  fx.appendChild(food$);
  const sX = 800, sY = 300;
  Audio.sfx('pop');
  tween(600, t => {
    const e = easeInOut(t);
    food$.setAttribute('x', sX + (sx - sX) * e);
    food$.setAttribute('y', sY + (sy - sY) * e);
    food$.setAttribute('font-size', 84 - 42 * e);
    food$.setAttribute('opacity', t > 0.85 ? (1 - (t - 0.85) / 0.15) : 1);
  }, () => {
    food$.remove();
    const inner = eg.firstElementChild;
    if (inner) {
      const base = inner.getAttribute('transform') || '';
      tween(650, t => inner.setAttribute('transform', `${base} scale(${1 + Math.sin(t * Math.PI * 3) * 0.07} ${1 - Math.sin(t * Math.PI * 3) * 0.05})`),
        () => inner.setAttribute('transform', base));
    }
    Audio.sfx('munch');
    floaters(fx, sx, sy - 30, 'heart');
    setTimeout(() => Audio.say(pick(YUMS)), 500);
  });
}

  try {

    reduce ? stage.pauseAnimations() : stage.unpauseAnimations();
  } catch (e) {}
}

// A kid starts in their OWN clothes — the ones drawn from their photo. A null
// slot means "as drawn"; it only becomes a wardrobe id once the player picks one.
// Without this, every girl booted up wearing Eya's tiara.
const DEFAULT_OUTFIT = { top: null, hat: null, shoes: null };

const CATS = ['top', 'hat', 'shoes'];

// The dress-up rack for a hero: girls get the dresses, boys get the boy items.
function wardrobeFor(gender) {
  return gender === 'boy' ? BOY_WARDROBE : WARDROBE;
}
function heroGender() {
  const c = CHARACTERS[State.hero];
  return c && c.gender === 'boy' ? 'boy' : 'girl';
}
function defaultOutfit() { return { ...DEFAULT_OUTFIT }; }

// Outfits are keyed per kid, so dressing Tia does not undress Timmy.
State.saveOutfit = function () {
  try { localStorage.setItem('soft-outfit-' + State.hero, JSON.stringify(State.outfit)); } catch (e) {}
};
State.loadOutfit = function () {
  const def = defaultOutfit();
  let o = null;
  try { o = JSON.parse(localStorage.getItem('soft-outfit-' + State.hero)); } catch (e) {}
  State.outfit = { ...def, ...(o || {}) };
  // drop ids this hero cannot wear (an older version, or the other gender's rack)
  const rack = wardrobeFor(heroGender());
  for (const cat of CATS) {
    const id = State.outfit[cat];
    if (id && !rack[cat].some(i => i.id === id)) State.outfit[cat] = null;
  }
};

// The hero as they should be drawn right now: their character spec, wearing
// whatever the dress-up screen last set.
function heroSpec() {
  const base = CHARACTERS[State.hero] || CHARACTERS.eya;
  const s = JSON.parse(JSON.stringify(base));
  const rack = wardrobeFor(heroGender());
  const o = State.outfit || defaultOutfit();
  for (const cat of CATS) {
    if (!o[cat]) continue;                 // untouched slot: keep what they really wear
    const item = rack[cat].find(i => i.id === o[cat]);
    if (item) item.mut(s);
  }
  return s;
}
function heroLabel() {
  const c = CHARACTERS[State.hero];
  return c ? c.label : 'Eya';
}
// The household the hero lives in — their home. Everyone else's is a visit.
function heroHome() {
  return HOUSES.find(h => h.kids.includes(State.hero)) || HOUSES[0];
}

// Houses zig-zag along the barangay road in a near/far row, the shape the map
// already had by hand. The world grows with the cast; the town is anchored to
// the right of the last house rather than at a fixed x.
const HOUSE_GAP = 390;
const HOUSE_X0 = 250;

function layoutHouses() {
  return HOUSEHOLDS.map((h, i) => ({
    ...h,
    color: HOUSE_COLORS[i % HOUSE_COLORS.length],
    residents: [...h.kids, ...h.parents],
    x: HOUSE_X0 + i * HOUSE_GAP,
    y: i % 2 ? 640 : 430,           // far row / near row
  }));
}

// Scattered grass tufts and flowers. Flat green ground reads as a bedsheet;
// a little scatter is what makes it read as a field.
function groundScatter(x0, x1, seed = 1) {
  let n = seed * 9301 + 49297;
  const rnd = () => ((n = (n * 9301 + 49297) % 233280) / 233280);
  const cols = ['#ff8fb5', '#ffd94d', '#f47a5e', '#fff', '#c9a0f0'];
  let out = '';
  for (let x = x0; x < x1; x += 90) {
    const gx = x + rnd() * 70, gy = 300 + rnd() * 570;
    out += `<path d="M ${gx} ${gy} q -5 -16 -2 -24 M ${gx} ${gy} q 4 -18 9 -23 M ${gx} ${gy} q 12 -12 18 -14"
      stroke="#5fae43" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.75"/>`;
    if (rnd() > 0.62) {
      const fx = x + rnd() * 80, fy = 320 + rnd() * 540, c = cols[Math.floor(rnd() * cols.length)];
      out += `<g transform="translate(${fx} ${fy})">${[0, 72, 144, 216, 288].map(a =>
        `<ellipse cx="0" cy="-6" rx="4" ry="6" fill="${c}" transform="rotate(${a})"/>`).join('')}<circle r="3" fill="#ffe066"/></g>`;
    }
  }
  return `<g>${out}</g>`;
}

      <g id="world">
        <rect id="mapGround" x="0" y="240" width="${WORLD_W}" height="660" fill="url(#grass)"/>
        <path d="M 0 240 Q 400 210 800 240 Q 1200 270 1600 240 T 2400 240 T 3200 240 T ${WORLD_W} 240 L ${WORLD_W} 268 Q 3200 298 2400 268 T 800 268 T 0 268 Z" fill="#a3dc80"/>
        <!-- the barangay road, drawn once from end to end -->
        <path d="${ROAD_D}" fill="none" stroke="#c9ab7e" stroke-width="96" stroke-linecap="round"/>
        <path d="${ROAD_D}" fill="none" stroke="url(#road)" stroke-width="86" stroke-linecap="round"/>
        <path d="${ROAD_D}" fill="none" stroke="#fffaf2" stroke-width="6" stroke-dasharray="26 30" opacity="0.75"/>
        ${MAP_DECOR}
        ${mapToysSVG()}
        ${playgroundSVG()}
        <!-- buildings and the hero are y-sorted, so you can walk behind a house -->
        <g id="depthLayer">
          ${HOUSES.map(houseSVG).join('')}
          ${schoolSVG(PLACES[0])}
          ${churchSVG(PLACES[1])}
          ${snrSVG(PLACES[2])}
          ${smSVG(PLACES[3])}
          <g id="heroWalk"></g>
        </g>
      </g>
      ${muteButtonSVG()}
      <!-- who am I? tap your own face to play as someone else -->
      <g id="swapBtn" class="clayBtn" style="cursor:pointer" role="button" aria-label="Play as someone else" tabindex="0">
        <g class="clayPress">
          <circle cx="1520" cy="812" r="62" fill="#fff" filter="url(#clayDrop)"/>
          ${buildFace(CHARACTERS[State.hero] || CHARACTERS.eya, { x: 1520, y: 812, scale: 0.76 })}
          <circle cx="1520" cy="812" r="60" fill="none" stroke="#fff" stroke-width="5" opacity="0.8"/>
          <circle cx="1568" cy="768" r="24" fill="#ffce3d" stroke="#fff" stroke-width="4"/>
          ${icon('swap', 1568, 768, 24, '#7a5a10', 2.6)}
        </g>
      </g>
      <g id="fxLayer"></g>
      <g id="uiLayer"></g>
    `;
    $('#swapBtn').addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      Audio.sfx('pop');
      App.go('pick');
    });

    const world = $('#world');
    // camera starts centred on the hero's spawn; from here the empty ground pans it
    this.camX = clamp(spawn.x - 800, 0, WORLD_W - 1600);
    world.setAttribute('transform', `translate(${-this.camX} 0)`);
    const setCam = cx => {
      this.camX = clamp(cx, 0, WORLD_W - 1600);
      world.setAttribute('transform', `translate(${-this.camX} 0)`);
    };
    // drag empty grass to pan the world
    const panGround = e => {
      if (App.locked) return;
      const s0 = toStage(e.clientX, e.clientY);
      const cam0 = this.camX;
      let panned = false;
      const move = ev => {
        const s = toStage(ev.clientX, ev.clientY);
        if (Math.abs(s.x - s0.x) > 4) panned = true;
        setCam(cam0 - (s.x - s0.x));
      };
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
        window.removeEventListener('pointercancel', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
      window.addEventListener('pointercancel', up);
    };
    const hero = this.hero = makeWalker({
      g: $('#heroWalk'), spec: heroSpec(),
      x: spawn.x, y: spawn.y,
      bounds: { minX: 60, maxX: WORLD_W - 60, minY: 360, maxY: 860 },
      scaleFn: y => clamp(0.42 + (y - 300) / 900 * 0.55, 0.42, 0.78),
      uiLayer: $('#uiLayer'),
      toLocal: p => ({ x: p.x + this.camX, y: p.y }),
      onPan: panGround,
    });
    hero.place();
    const walkTo = (tx, ty, done) => hero.walkTo(tx, ty, done);
    hero.attachGround($('#mapGround'));
    installFoodTray(() => this.hero, () => this.camX);

    // decorations wiggle (skip playground pieces — they have their own handlers)
    world.querySelectorAll('.deco').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const p = toStage(e.clientX, e.clientY);
        walkTo(clamp(p.x + this.camX, 60, WORLD_W - 60), clamp(p.y + 60, 360, 860));
        Audio.sfx('pop');
        const base = el.getAttribute('transform') || '';
        tween(500, t => {
          el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI * 4) * 4})`);
        }, () => el.setAttribute('transform', base));
      });
    });

    // playground + scattered toys
    this.wirePlayground(world, hero);
    this.wireMapToys(world, hero);

    // door sequence shared by houses (data-house) and places (data-place):
    // tap the building and the hero knocks + the door swings open, then we go inside
    const enterViaDoor = (el, doorX, doorY, target, spawnBack) => {
      App.locked = true;
      Audio.sfx('knock');
      setTimeout(() => Audio.say('Tao po!'), 300);
      const door = el.querySelector('.door');
      setTimeout(() => {
        if (door) tween(450, t => {
          const k = Math.max(0.12, Math.cos(t * 1.35));
          door.setAttribute('transform', `translate(-42 0) scale(${k} 1) translate(42 0)`);
        });
        Audio.sfx('chime');
      }, 650);
      setTimeout(() => {
        State.mapSpawn = spawnBack;
        App.locked = false;
        App.go(target);
      }, 1250);
    };

    world.querySelectorAll('.house[data-house]').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const h = HOUSES.find(x => x.id === el.dataset.house);
        enterViaDoor(el, h.x + 70, h.y + 34, 'house:' + h.id, { x: h.x + 70, y: h.y + 34 });
      });
    });

    world.querySelectorAll('.house[data-place]').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const pl = PLACES.find(x => x.id === el.dataset.place);
        const doorX = pl.id === 'school' ? pl.x + 90 : pl.x;
        enterViaDoor(el, doorX, pl.y + 34, 'place:' + pl.id, { x: doorX, y: pl.y + 34 });
      });
    });

    wireMuteButton();
  },
  wireMapToys(world, hero) {
    const heroEl = $('#heroWalk');
    const restore = (x, y) => { hero.pos.x = x; hero.pos.y = y; hero.place(); };

    // DOG — pet it: tail wags + bark
    const dog = world.querySelector('[data-toy="dog"]');
    if (dog) dog.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(830, 560, 130, () => {
        Audio.sfx('bark');
        const tail = dog.querySelector('.dogTail');
        tween(900, t => { if (tail) tail.setAttribute('transform', `rotate(${Math.sin(t * Math.PI * 6) * 24} 40 0)`); },
          () => { if (tail) tail.setAttribute('transform', ''); });
      });
    });

    // BUBBLE WAND — puff out bubbles that float and pop when tapped
    const wand = world.querySelector('[data-toy="bubbles"]');
    if (wand) wand.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(150, 640, 120, () => {
        Audio.sfx('pop');
        for (let i = 0; i < 8; i++) {
          const b = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          b.setAttribute('style', 'cursor:pointer');
          const r = rand(16, 30);
          b.innerHTML = `<circle r="${r}" fill="#bfe8f2" opacity="0.5" stroke="#8ecae6" stroke-width="3"/>
            <circle cx="${-r / 3}" cy="${-r / 3}" r="${r / 4}" fill="#fff" opacity="0.8"/>`;
          world.appendChild(b);
          const sx = 165 + rand(-10, 10), sy = 540;
          let popped = false;
          b.addEventListener('pointerdown', ev => { ev.stopPropagation(); if (!popped) { popped = true; Audio.sfx('pop'); b.remove(); } });
          const drift = rand(-120, 120), rise = rand(360, 520), dur = rand(2600, 4200);
          tween(dur, t => b.setAttribute('transform', `translate(${sx + drift * t + Math.sin(t * 8) * 14} ${sy - rise * t})`),
            () => { if (!popped) b.remove(); });
        }
      });
    });

    // KITE — make it climb and sway
    const kite = world.querySelector('[data-toy="kite"]');
    const kiteBody = world.querySelector('#kiteBody'), kiteString = world.querySelector('#kiteString');
    if (kite) kite.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(1980, 800, 160, () => {
        Audio.sfx('whee');
        tween(5000, t => {
          const climb = Math.sin(Math.min(1, t * 2) * Math.PI / 2); // rise then hold
          const y = 430 - climb * 120;
          const x = 2060 + Math.sin(t * Math.PI * 6) * 60;
          if (kiteBody) kiteBody.setAttribute('transform', `translate(${x} ${y}) rotate(${Math.sin(t * Math.PI * 6) * 12})`);
          if (kiteString) { kiteString.setAttribute('x2', x); kiteString.setAttribute('y2', y); }
        }, () => {
          if (kiteBody) kiteBody.setAttribute('transform', 'translate(2060 430)');
          if (kiteString) { kiteString.setAttribute('x2', 2060); kiteString.setAttribute('y2', 430); }
        });
      });
    });

    // JUMP ROPE — the hero hops three times
    const rope = world.querySelector('[data-toy="rope"]');
    const ropeArc = world.querySelector('#ropeArc');
    if (rope) rope.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(2600, 810, 110, () => {
        App.locked = true;
        hero.stop();
        const baseX = 2600, baseY = 810;
        tween(1800, t => {
          const phase = t * 3; // 3 jumps
          const hop = Math.abs(Math.sin(phase * Math.PI)) * 70;
          const s = hero.scaleFn ? hero.scaleFn(baseY) : 1;
          heroEl.setAttribute('transform', `translate(${baseX} ${baseY - hop}) scale(${s})`);
          if (ropeArc) {
            const swing = Math.cos(phase * Math.PI * 2);
            ropeArc.setAttribute('d', `M -46 -10 Q 0 ${20 + swing * 50} 46 -10`);
          }
          if (hop > 60 && !rope.dataset.b) { rope.dataset.b = '1'; Audio.sfx('boing'); }
          else if (hop < 20) rope.dataset.b = '';
        }, () => { if (ropeArc) ropeArc.setAttribute('d', 'M -46 -10 Q 0 60 46 -10'); restore(2600, 810); App.locked = false; });
      });
    });

    // BASKETBALL — shoot from wherever the ball is. It arcs, swishes, and drops.
    const court = world.querySelector('[data-toy="court"]');
    const courtBallHit = world.querySelector('[data-toy="courtBall"]');
    const courtBall = world.querySelector('#courtBall');
    const courtNet = world.querySelector('.courtNet');
    const shoot = () => {
      if (App.locked || !courtBall) return;
      App.locked = true;
      const m = /translate\(([-\d.]+) ([-\d.]+)\)/.exec(courtBall.getAttribute('transform'));
      const bx = m ? +m[1] : 7180, by = m ? +m[2] : 846;
      const rimX = 7000, rimY = 566;
      Audio.sfx('whee');
      tween(780, t => {
        const e2 = easeInOut(t);
        const x = bx + (rimX - bx) * e2;
        const y = by + (rimY - by) * e2 - Math.sin(t * Math.PI) * 190;
        courtBall.setAttribute('transform', `translate(${x} ${y}) rotate(${t * 420})`);
      }, () => {
        Audio.sfx('bounce');
        if (courtNet) tween(420, t => courtNet.setAttribute('transform', `translate(0 ${Math.sin(t * Math.PI) * 12})`),
          () => courtNet.setAttribute('transform', ''));
        // through the hoop and back down to the court
        tween(460, t => courtBall.setAttribute('transform', `translate(${rimX} ${rimY + (846 - rimY) * t})`),
          () => {
            courtBall.setAttribute('transform', 'translate(7180 846)');
            Audio.sfx('clap');
            confettiBurst(rimX - this.camX, 480);
            Audio.say('Shoot! Ang galing!');
            App.locked = false;
          });
      });
    };
    if (court) court.addEventListener('pointerdown', e => { e.stopPropagation(); shoot(); });
    if (courtBallHit) courtBallHit.addEventListener('pointerdown', e => { e.stopPropagation(); shoot(); });

    // FOOTBALL — boot it and it rolls away, spinning
    const football = world.querySelector('[data-toy="football"]');
    const footballBall = world.querySelector('#footballBall');
    if (football) football.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      Audio.sfx('boing');
      const home = { x: 1720, y: 838 };
      const dx = rand(-360, 360), dy = rand(-40, 30);
      tween(1400, t => {
        const e2 = 1 - Math.pow(1 - t, 3);                     // roll out and slow down
        const hop = Math.abs(Math.sin(t * Math.PI * 2)) * 60 * (1 - t);
        footballBall.setAttribute('transform',
          `translate(${home.x + dx * e2} ${home.y + dy * e2 - hop}) rotate(${dx * e2 * 1.6})`);
      }, () => {
        // it always rolls home, so it can never be booted out of the world
        tween(600, t => footballBall.setAttribute('transform',
          `translate(${home.x + dx * (1 - t)} ${home.y + dy * (1 - t)}) rotate(${dx * (1 - t) * 1.6})`),
          () => footballBall.setAttribute('transform', 'translate(1720 838)'));
      });
    });

    // BUBBLE MACHINE — a stream of bubbles drifts over the barangay
    const machine = world.querySelector('[data-toy="bubbleMachine"]');
    if (machine) machine.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      Audio.sfx('pop');
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          const b = document.createElementNS(SVGNS, 'g');
          b.setAttribute('style', 'cursor:pointer');
          const r = rand(16, 36);
          b.innerHTML = `<circle r="${r}" fill="#bfe8f2" opacity="0.45" stroke="#8ecae6" stroke-width="3"/>
            <circle cx="${-r / 3}" cy="${-r / 3}" r="${r / 4}" fill="#fff" opacity="0.85"/>`;
          world.appendChild(b);
          let popped = false;
          b.addEventListener('pointerdown', ev => {
            ev.stopPropagation();
            if (popped) return;
            popped = true; Audio.sfx('pop'); b.remove();
          });
          const sx = 900 + rand(-16, 16), sy = 730;
          const drift = rand(-190, 190), rise = rand(420, 640), dur = rand(3000, 5000);
          tween(dur, t => b.setAttribute('transform',
            `translate(${sx + drift * t + Math.sin(t * 9) * 18} ${sy - rise * t})`),
            () => { if (!popped) b.remove(); });
        }, i * 130);
      }
    });

    // TRICYCLE — hop on and ride east a short way, then hop off
    const trike = world.querySelector('[data-toy="trike"]');
    const trikeArt = world.querySelector('.trikeArt');
    if (trike) trike.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(1330, 810, 120, () => {
        App.locked = true;
        hero.stop();
        heroEl.setAttribute('opacity', '0');
        const startX = 1330, endX = 1900;
        let putt = 0;
        tween(3200, t => {
          const x = startX + (endX - startX) * easeInOut(t);
          if (trikeArt) trikeArt.setAttribute('transform', `translate(${x - 1330} 0)`);
          // the hero rides on top
          const s = (hero.scaleFn ? hero.scaleFn(810) : 1) * 0.9;
          heroEl.setAttribute('opacity', '1');
          heroEl.setAttribute('transform', `translate(${x - 6} 748) scale(${s})`);
          if (t * 3200 - putt > 260) { putt = t * 3200; Audio.sfx('bounce'); }
          hero.pos.x = x; hero.pos.y = 810;
          this.camX = clamp(x - 800, 0, WORLD_W - 1600);
          world.setAttribute('transform', `translate(${-this.camX} 0)`);
        }, () => {
          if (trikeArt) trikeArt.setAttribute('transform', 'translate(0 0)'); // trike rolls home (off-screen left)
          heroEl.setAttribute('opacity', '1');
          restore(endX + 70, 810);
          App.locked = false;
        });
      });
    });
  },

  wirePlayground(world, hero) {
    const heroEl = $('#heroWalk');
    const restore = (x, y) => { hero.pos.x = x; hero.pos.y = y; hero.place(); };

    // SLIDE ─ climb the ladder, whoosh down the chute
    const slide = world.querySelector('[data-pg="slide"]');
    if (slide) slide.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(2660, 800, 60, () => {
        App.locked = true;
        hero.stop();
        // climb
        tween(900, t => {
          const x = 2660 + (2705 - 2660) * t, y = 800 + (490 - 800) * t;
          const s = hero.scaleFn ? hero.scaleFn(y) : 1;
          heroEl.setAttribute('transform', `translate(${x} ${y}) scale(${s})`);
          if (t > 0.5 && !slide.dataset.said) { slide.dataset.said = '1'; }
        }, () => {
          Audio.sfx('whee'); Audio.say('Wheee!');
          // slide down chute (quadratic P0->P1->P2)
          const P0 = [2705, 495], P1 = [2770, 760], P2 = [2910, 748];
          tween(800, t => {
            const u = 1 - t;
            const x = u * u * P0[0] + 2 * u * t * P1[0] + t * t * P2[0];
            const y = u * u * P0[1] + 2 * u * t * P1[1] + t * t * P2[1];
            const s = hero.scaleFn ? hero.scaleFn(y) : 1;
            heroEl.setAttribute('transform', `translate(${x} ${y}) scale(${s})`);
          }, () => { restore(2910, 780); slide.dataset.said = ''; App.locked = false; });
        });
      });
    });

    // SWING ─ sit and swing back and forth
    const swing = world.querySelector('[data-pg="swing"]');
    const swingSeat = world.querySelector('#swingSeat');
    if (swing) swing.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(3080, 800, 70, () => {
        App.locked = true;
        hero.stop();
        const pivot = [3080, 430], L = 300;
        tween(2600, t => {
          const th = 0.5 * Math.sin(t * Math.PI * 6) * (1 - t * 0.15); // radians
          const sx = pivot[0] + L * Math.sin(th), sy = pivot[1] + L * Math.cos(th);
          if (swingSeat) swingSeat.setAttribute('transform', `rotate(${th * 180 / Math.PI} ${pivot[0]} ${pivot[1]})`);
          const s = hero.scaleFn ? hero.scaleFn(sy) : 1;
          heroEl.setAttribute('transform', `translate(${sx} ${sy + 10}) scale(${s})`);
          if (Math.abs(th) > 0.45 && !swing.dataset.b) { swing.dataset.b = '1'; Audio.sfx('boing'); }
          else if (Math.abs(th) < 0.2) swing.dataset.b = '';
        }, () => { if (swingSeat) swingSeat.setAttribute('transform', ''); restore(3080, 790); App.locked = false; });
      });
    });

    // SEESAW ─ ride up and down with a friend
    const seesaw = world.querySelector('[data-pg="seesaw"]');
    const plank = world.querySelector('#seesawPlank');
    if (seesaw) seesaw.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(3300, 800, 70, () => {
        App.locked = true;
        hero.stop();
        const pivot = [3380, 745];
        tween(2400, t => {
          const th = 0.18 * Math.sin(t * Math.PI * 8) * (1 - t * 0.2);
          if (plank) plank.setAttribute('transform', `rotate(${th * 180 / Math.PI} ${pivot[0]} ${pivot[1]})`);
          const ny = 705 - Math.sin(th) * 90; // near (left) end height
          const s = hero.scaleFn ? hero.scaleFn(ny + 60) : 1;
          heroEl.setAttribute('transform', `translate(3300 ${ny + 60}) scale(${s})`);
          if (Math.abs(th) > 0.15 && !seesaw.dataset.b) { seesaw.dataset.b = '1'; Audio.sfx('boing'); }
          else if (Math.abs(th) < 0.05) seesaw.dataset.b = '';
        }, () => { if (plank) plank.setAttribute('transform', ''); restore(3300, 800); App.locked = false; });
      });
    });

    // SANDBOX ─ build a sandcastle (tap to build, tap again to flatten)
    const sandbox = world.querySelector('[data-pg="sandbox"]');
    const castle = world.querySelector('#sandcastle');
    if (sandbox) sandbox.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(3600, 815, 95, () => {
        const built = sandbox.dataset.built === '1';
        sandbox.dataset.built = built ? '' : '1';
        Audio.sfx(built ? 'pop' : 'sparkle');
        tween(500, t => {
          const k = built ? 1 - easeInOut(t) : easeInOut(t);
          if (castle) castle.setAttribute('transform', `translate(3600 808) scale(${k})`);
        });
      });
    });

    // BEACH BALL ─ tap to make it bounce
    const ball = world.querySelector('[data-pg="ball"]');
    if (ball) ball.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      hero.approach(3210, 805, 90, () => {
        Audio.sfx('bounce');
        tween(900, t => {
          const h = Math.abs(Math.sin(t * Math.PI * 3)) * 120 * (1 - t);
          const sq = 1 + Math.cos(t * Math.PI * 6) * 0.08 * (1 - t);
          ball.setAttribute('transform', `translate(3220 ${800 - h}) scale(${1 / sq} ${sq})`);
        }, () => ball.setAttribute('transform', 'translate(3220 800)'));
      });
    });

    // BUTTERFLIES ─ tap to make them flutter happily
    world.querySelectorAll('.butterfly').forEach(bf => {
      bf.addEventListener('pointerdown', e => {
        e.stopPropagation();
        Audio.sfx('giggle');
        const wings = bf.querySelector('.wings');
        tween(600, t => { if (wings) wings.setAttribute('transform', `scale(${1 + Math.sin(t * Math.PI * 6) * 0.3} 1)`); },
          () => { if (wings) wings.setAttribute('transform', ''); });
      });
    });
  },
  exit() {
    if (this.hero) { this.hero.destroy(); this.hero = null; }
  }
};

// Extra outdoor toys scattered around the map (absolute world coords).
function mapToysSVG() {
  return `<g id="mapToys">
    <!-- friendly dog near Lola's house -->
    <g class="toy" data-toy="dog" transform="translate(830 500)" style="cursor:pointer">
      <ellipse cx="0" cy="6" rx="46" ry="30" fill="#c9905a"/>
      <path class="dogTail" d="M 40 0 Q 74 -6 70 -34" stroke="#c9905a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <rect x="-34" y="20" width="12" height="22" rx="5" fill="#b8804a"/>
      <rect x="22" y="20" width="12" height="22" rx="5" fill="#b8804a"/>
      <circle cx="-42" cy="-24" r="28" fill="#c9905a"/>
      <path d="M -64 -40 Q -74 -14 -58 -6 Z" fill="#b8804a"/>
      <ellipse cx="-52" cy="0" rx="14" ry="10" fill="#e8c090"/>
      <circle cx="-50" cy="-28" r="4" fill="#241812"/><circle cx="-34" cy="-26" r="4" fill="#241812"/>
      <ellipse cx="-56" cy="-6" rx="6" ry="4" fill="#3a2a1a"/>
    </g>

    <!-- bubble wand near Bahay ni Eya -->

// ============================================================ PLACE SCENES (school + SOFT church)
const INTERIOR_BOUNDS = { minX: 120, maxX: 1480, minY: 640, maxY: 865 };
const interiorScale = y => 0.5 + (y - 640) / 225 * 0.2;

Scenes.place = {
  enter(id) {
    if (id === 'school') this.enterSchool();
    else if (id === 'church') this.enterChurch();
    else if (id === 'snr') this.enterSnr();
    else if (id === 'sm') this.enterSm();
    else App.go('map');
  },

  // ---- shared: spawn the hero walker + home button + mute, return the walker
  finishRoom(sx = 200, sy = 820) {
    const hero = this.hero = makeWalker({
      g: $('#heroWalkP'), spec: heroSpec(),
      x: sx, y: sy, bounds: INTERIOR_BOUNDS, scaleFn: interiorScale,
      uiLayer: $('#uiLayerP'),
    });
    hero.attachGround($('#roomGround'));
    installFoodTray(() => this.hero);
    $('#homeBtn').addEventListener('pointerdown', e => { e.stopPropagation(); App.go('map'); });
    wireMuteButton();
    return hero;
  },

  // person the hero taps: they wave + speak + offer hug/high-five
  wirePerson(el, x, y, line) {
    const react = () => {
      waveCharacter(el);
      Audio.sfx('chime');
      Audio.say(line);
      showPersonActions(el.firstElementChild, $('#heroWalkP').firstElementChild, pos.x, pos.y, $('#uiLayerP'));
    };
    const pos = makeCharMovable(el, { x, y }, { minX: 160, maxX: 1440, minY: 680, maxY: 858 }, {
      onTap: react,
      onDrop: p => {
        if (this.hero && dist(p.x, p.y, this.hero.pos.x, this.hero.pos.y) < 180)
          hugTogether(el.firstElementChild, $('#heroWalkP').firstElementChild, p.x, p.y, $('#uiLayerP'));
      },
    });
  },

  // ============ SCHOOL ============
  enterSchool() {
    const deskSVG = (x, y) => `
      <g transform="translate(${x} ${y})">

    const people = [
      { key: 'teacher', x: 300, y: 720, s: 0.78, face: 1, line: `Good morning, ${heroLabel()}!` },
      { key: 'rachel', x: 780, y: 810, s: 0.62, face: 1, line: `Hi ${heroLabel()}!` },
      { key: 'kidA', x: 1150, y: 802, s: 0.52, face: -1, line: 'Miko' },
      { key: 'kidB', x: 1380, y: 828, s: 0.52, face: -1, line: 'Lia' },
    ];
    $('#peopleLayer').innerHTML = people.map(p =>
      `<g class="person" data-key="${p.key}" data-depth="${p.y}" style="cursor:pointer">${
        buildCharacter(CHARACTERS[p.key], { x: p.x, y: p.y, scale: p.s, idle: true, facing: p.face })

    people.forEach(p => this.wirePerson($(`.person[data-key="${p.key}"]`), p.x, p.y, p.line));

    // props: bell + ABC blocks + drawing easel
    $('#propLayer').innerHTML = `
      <g data-prop="bell" transform="translate(470 720)" style="cursor:pointer">
        <path d="M -34 20 Q -34 -34 0 -34 Q 34 -34 34 20 Z" fill="#f2c94c" stroke="#d9a834" stroke-width="4"/>
        <rect x="-6" y="-46" width="12" height="16" rx="4" fill="#a87c4a"/>
        <ellipse cx="0" cy="22" rx="40" ry="8" fill="#e8b13a"/>
        <circle cx="0" cy="26" r="7" fill="#8a6242"/>
      </g>
      <g data-prop="blockE" transform="translate(600 850)" style="cursor:pointer">${PROP_ART.block('E', '#8ecae6')}</g>
      <g data-prop="blockY" transform="translate(690 862)" style="cursor:pointer">${PROP_ART.block('Y', '#9edb7a')}</g>
      <g data-prop="blockA" transform="translate(780 850)" style="cursor:pointer">${PROP_ART.block('A', '#ffb347')}</g>
      <g data-prop="easel" transform="translate(1050 770)" style="cursor:pointer">
        <line x1="-46" y1="120" x2="-18" y2="-70" stroke="#a87c4a" stroke-width="10"/>
        <line x1="46" y1="120" x2="18" y2="-70" stroke="#a87c4a" stroke-width="10"/>
        <line x1="0" y1="120" x2="0" y2="20" stroke="#a87c4a" stroke-width="10"/>
        <rect x="-70" y="-90" width="140" height="150" rx="6" fill="#fffaf2" stroke="#c9a276" stroke-width="6"/>
        <path d="M -34 8 Q -6 42 22 8" stroke="#ff8fb5" stroke-width="7" fill="none" stroke-linecap="round"/>
        <circle cx="-30" cy="-40" r="16" fill="#ffe066"/>
      </g>`;

    const letters = { blockE: 'E', blockY: 'Y', blockA: 'A' };
    Object.keys(letters).forEach(id => {
      const el = $(`[data-prop="${id}"]`);
      const bx = +el.getAttribute('transform').match(/translate\(([-\d.]+)/)[1];
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        hero.approach(bx, 850, 150, () => {
          Audio.sfx('pop'); Audio.say(letters[id]);
          const base = el.getAttribute('transform');
          tween(500, t => el.setAttribute('transform', `${base} scale(${1 + Math.sin(t * Math.PI * 3) * 0.14 * (1 - t)})`),

        stage.querySelectorAll('.person').forEach(pel => waveCharacter(pel));
        setTimeout(() => Audio.say('Recess na!'), 300);
      });
    });

    // story time on the mat
    stage.querySelectorAll('[data-mat="1"]').forEach(mat => {
      mat.addEventListener('pointerdown', e => {
        e.stopPropagation();
        this.storyTime();
      });
    });

    // drawing easel
    $('[data-prop="easel"]').addEventListener('pointerdown', e => {
      e.stopPropagation();
      hero.approach(1050, 800, 200, () => this.openDrawing());
    });
  },

  storyTime() {
    if (App.locked) return;
    this.hero.approach(470, 815, 120, () => {
      App.locked = true;
      const fx = $('#fxLayer');
      fx.innerHTML = `
        <g id="storyBook" transform="translate(800 470)" opacity="0">
          <rect x="-210" y="-150" width="420" height="300" rx="16" fill="#8a5f3c"/>
          <rect x="-198" y="-138" width="196" height="276" rx="8" fill="#fffaf2"/>
          <rect x="2" y="-138" width="196" height="276" rx="8" fill="#fffaf2"/>
          <line x1="0" y1="-138" x2="0" y2="138" stroke="#d9c9a8" stroke-width="4"/>
          <text x="-100" y="-40" text-anchor="middle" font-size="80">🌞</text>
          <text id="storyPic" x="100" y="-30" text-anchor="middle" font-size="80">🐣</text>
          ${bigLabel(-100, 90, 'A B C', { size: 40, fill: '#e8709c', stroke: '#fff' })}
        </g>`;
      const book = $('#storyBook');
      tween(300, t => book.setAttribute('opacity', t));
      const pics = ['🐣', '🌸', '🦋', '⭐'];
      let i = 0;
      const flip = () => {
        i++;
        Audio.sfx('pageflip');
        $('#storyPic').textContent = pics[i % pics.length];
        if (i < 3) setTimeout(flip, 1200);
        else setTimeout(() => {
          tween(300, t => book.setAttribute('opacity', 1 - t), () => { fx.innerHTML = ''; App.locked = false; });
        }, 1200);
      };
      setTimeout(flip, 1000);
    });
  },

  openDrawing() {
    const colors = ['#e05a6a', '#4a90d9', '#ffd94d', '#9edb7a'];
    let color = colors[0];
    const overlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    overlay.setAttribute('id', 'drawOverlay');
    overlay.innerHTML = `
      <rect width="1600" height="900" fill="#2a2a30" opacity="0.4"/>
      <rect x="200" y="120" width="1200" height="660" rx="18" fill="#fffaf2" id="drawPaper" style="cursor:crosshair"/>
      <g id="inkLayer" pointer-events="none"></g>
      ${colors.map((c, i) => `<circle class="crayon" data-c="${c}" cx="${260 + i * 90}" cy="820" r="34" fill="${c}" stroke="${c === color ? '#2a2a30' : '#fff'}" stroke-width="5" style="cursor:pointer"/>`).join('')}
      <g id="eraseBtn" style="cursor:pointer"><circle cx="${260 + 4 * 90}" cy="820" r="34" fill="#fff" stroke="#c9c9d2" stroke-width="5"/><text x="${260 + 4 * 90}" y="834" text-anchor="middle" font-size="34">🧽</text></g>
      <g id="drawDone" style="cursor:pointer"><circle cx="1340" cy="820" r="40" fill="#9edb7a" stroke="#fff" stroke-width="6"/><path d="M 1322 820 L 1335 834 L 1360 806" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>`;
    stage.appendChild(overlay);
    const paper = $('#drawPaper'), ink = $('#inkLayer');
    let drawing = false, pts = [], line = null;
    const start = e => {
      drawing = true; pts = []; Audio.sfx('pop');
      line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      line.setAttribute('fill', 'none'); line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', '12'); line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('stroke-linejoin', 'round');
      ink.appendChild(line);
      add(e);
    };
    const add = e => {
      const p = toStage(e.clientX, e.clientY);
      pts.push(`${p.x.toFixed(0)},${p.y.toFixed(0)}`);
      line.setAttribute('points', pts.join(' '));
    };
    const move = e => { if (drawing) add(e); };
    const end = () => { drawing = false; };
    paper.addEventListener('pointerdown', start);
    window.addEventListener('pointermove', move);

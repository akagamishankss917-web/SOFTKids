// ============================================================ INTERIORS
// darken(): the counterpart to lighten(), for the shaded face of a clay object.
function darken(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * (1 - f));
  const g = Math.round(((n >> 8) & 255) * (1 - f));
  const b = Math.round((n & 255) * (1 - f));
  return `#${((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1)}`;
}

function lighten(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const L = v => Math.round(v + (255 - v) * f);
  return `rgb(${L(n >> 16 & 255)},${L(n >> 8 & 255)},${L(n & 255)})`;
}

// ============================================================ DEPTH
// The room is drawn with a painter's algorithm: whoever is further down the
// floor is nearer the camera, so they draw last.
//
// Before this, props sat in a layer UNDER every character and the hero sat over
// everyone. Dragging a toy onto a person made it vanish behind them, and a
// resident standing in front of the hero still drew behind him. Both read as
// broken. Now every actor and every prop shares one layer and is re-sorted by
// its ground Y whenever anything settles.
//
// Sorting happens on drop, not on every pointermove: the thing in your hand is
// raised to the front while you hold it (which is what "picked up" should look
// like) and drops into its true depth when you let go.
function setDepth(el, y) { el.dataset.depth = y; }

function sortDepth(layer) {
  if (!layer) return;
  const kids = [...layer.children];
  kids.sort((a, b) => (+a.dataset.depth || 0) - (+b.dataset.depth || 0));
  kids.forEach(k => layer.appendChild(k));
}

// Scenes build people and props into separate layers because that is how the
// markup reads. Depth sorting only works if they end up siblings, so once a
// scene is built we lift them all into one layer and sort. Static furniture
// (table legs) is left behind on purpose — it belongs at the back.
function collectDepthLayer(sources) {
  const layer = $('#depthLayer');
  if (!layer) return;
  sources.forEach(sel => stage.querySelectorAll(sel).forEach(el => layer.appendChild(el)));
  sortDepth(layer);
}

// ---- drag with springy wobble
function getXY(el) { return { x: +el.dataset.x, y: +el.dataset.y }; }
function setXY(el, x, y) {
  el.dataset.x = x; el.dataset.y = y;
  setDepth(el, y);
  el.setAttribute('transform', `translate(${x} ${y}) scale(${el.dataset.s || 1})`);
}
function wobble(el) {
  const s = +(el.dataset.s || 1);
  tween(420, t => {
    const k = 1 + Math.sin(t * Math.PI * 3) * 0.14 * (1 - t);
    el.setAttribute('transform', `translate(${el.dataset.x} ${el.dataset.y}) scale(${s * k} ${s * (2 - k > 0 ? 2 - k : 1)})`);
  }, () => setXY(el, +el.dataset.x, +el.dataset.y));
}
// A toddler's tap is never perfectly still. Without a threshold, a few pixels of
// finger jitter counted as a drag, so the toy lurched out from under the tap and
// played a drop sound — the single biggest reason the props felt unresponsive.
// 12px, the same slop charDrag already uses on characters.
const DRAG_SLOP = 12;

function makeDraggable(el, opts = {}) {
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (App.locked) return;          // no fiddling with toys mid-animation
    const start = toStage(e.clientX, e.clientY);
    const base = getXY(el);
    const off = { x: base.x - start.x, y: base.y - start.y };
    el.parentNode.appendChild(el);   // raise to front
    Audio.sfx('pop');
    let dragging = false;
    const move = ev => {
      const p = toStage(ev.clientX, ev.clientY);
      const tx = p.x + off.x, ty = p.y + off.y;
      if (!dragging && dist(tx, ty, base.x, base.y) > DRAG_SLOP) dragging = true;
      if (dragging) setXY(el, clamp(tx, 50, 1550), clamp(ty, 140, 870));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      wobble(el);
      sortDepth(el.parentNode);
      // A tap is a tap: it wobbles and squeaks, but nothing is picked up or dropped.
      if (!dragging) { if (opts.onTap) opts.onTap(); return; }
      Audio.sfx(opts.dropSfx || 'boing');
      if (opts.onDrop) opts.onDrop(+el.dataset.x, +el.dataset.y, el);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

    rl.querySelectorAll('.resident').forEach(el => {
      const base = residentPos[el.dataset.key];
      const react = () => {
        waveCharacter(el);
        Audio.sfx('chime');
        Audio.say(CHARACTERS[el.dataset.key].label);
        showPersonActions(el.firstElementChild, $('#heroWalkH').firstElementChild, pos.x, pos.y, $('#uiLayerH'));
      };
      const pos = makeCharMovable(el, base, RES_BOUNDS, {
        onTap: react,
        onDrop: p => {
          if (dist(p.x, p.y, hero.pos.x, hero.pos.y) < 180)
            hugTogether(el.firstElementChild, $('#heroWalkH').firstElementChild, p.x, p.y, $('#uiLayerH'));
        },
      });
      residents.push({ el, pos });
    });
    // welcome wave from the host — and a compliment if the hero changed outfit
    const host = rl.querySelector('.resident');
    if (host) setTimeout(() => waveCharacter(host), 400);
    const outfitNow = JSON.stringify(State.outfit);
    if (State.lastCheeredOutfit && State.lastCheeredOutfit !== outfitNow) {
      setTimeout(() => { Audio.say(`${heroGender() === 'boy' ? 'Ang gwapo mo' : 'Ang ganda mo'}, ${heroLabel()}!`); Audio.sfx('sparkle'); }, 900);
    }
    State.lastCheeredOutfit = outfitNow;

    // props
    const pl = $('#propLayer');
    pl.innerHTML = props.map(p => `
      ${p.table ? `<g transform="translate(${p.x} ${p.y + 24})">
        <rect x="-110" y="-14" width="220" height="20" rx="8" fill="#a87c4a"/>
        <rect x="-92" y="6" width="16" height="86" fill="#8a6242"/>
        <rect x="76" y="6" width="16" height="86" fill="#8a6242"/></g>` : ''}
      <g class="prop" data-id="${p.id}" data-x="${p.x}" data-y="${p.y}" data-depth="${p.y}" data-s="${p.s}"
         transform="translate(${p.x} ${p.y}) scale(${p.s})" style="cursor:pointer">${propArt(p)}</g>
    `).join('');

    props.forEach(p => {
      const el = pl.querySelector(`.prop[data-id="${p.id}"]`);
      switch (p.kind) {
        case 'drag':
          makeDraggable(el, { dropSfx: p.dropSfx, onDrop: (x, y) => Scenes.house.onPropDrop(h, p, x, y, el) });
          break;
        case 'wardrobe':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            hero.approach(p.x, p.y, 230, () => {
              Audio.sfx('sparkle');
              App.go('dressup');
            });
          });
          break;
        case 'tap':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            hero.approach(p.x, p.y, 210, () => {
              Audio.sfx(p.sfx || 'pop');
              const s = p.s;
              if (p.anim === 'rock') {
                tween(900, t => el.setAttribute('transform',
                  `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 4) * 12})`),
                  () => setXY(el, p.x, p.y));
              } else if (p.anim === 'pulse' || p.anim === 'squeeze') {
                tween(500, t => {
                  const k = 1 + Math.sin(t * Math.PI * 2) * 0.12;
                  el.setAttribute('transform', `translate(${p.x} ${p.y}) scale(${s * k} ${s / k})`);
                }, () => setXY(el, p.x, p.y));
              } else if (p.anim === 'wiggle') {
                tween(500, t => el.setAttribute('transform',
                  `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 6) * 4})`),
                  () => setXY(el, p.x, p.y));
              } else if (p.anim === 'sheen') {
                const sheen = el.querySelector('.sheen');
                tween(600, t => sheen && sheen.setAttribute('transform', `translate(${-60 + t * 120} 0)`));
              }
            });
          });
          break;
        case 'water':
          makeDraggable(el, {
            onDrop: (x, y) => {
              props.filter(q => q.kind === 'pot').forEach(q => {
                const potEl = pl.querySelector(`.prop[data-id="${q.id}"]`);
                if (potEl && dist(x, y, +potEl.dataset.x, +potEl.dataset.y) < 150) {
                  const fl = potEl.querySelector('.flower');
                  if (fl && !potEl.dataset.bloomed) {
                    potEl.dataset.bloomed = '1';
                    Audio.sfx('sparkle');
                    tween(700, t => fl.setAttribute('transform', `scale(${easeInOut(t)})`));
                  }
                }
              });
            }
          });
          break;
        case 'pot': break; // static target
        case 'peek':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            Audio.sfx('pop');
            const fx = $('#fxLayer');
            fx.innerHTML = `
              <defs><mask id="peekMask">
                <rect width="1600" height="900" fill="white"/>
                <circle cx="710" cy="440" r="180" fill="black"/>
                <circle cx="930" cy="440" r="180" fill="black"/>
              </mask></defs>
              <rect width="1600" height="900" fill="#1a1a22" mask="url(#peekMask)" opacity="0.93"/>`;
            setTimeout(() => { fx.innerHTML = ''; Audio.sfx('chime'); }, 1600);
          });
          break;
        case 'umbrella':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            hero.approach(p.x, p.y, 210, () => {
              Audio.sfx('boing');
              const open = el.querySelector('.umb-open'), closed = el.querySelector('.umb-closed');
              const isOpen = open.style.display !== 'none';
              open.style.display = isOpen ? 'none' : '';
              closed.style.display = isOpen ? '' : 'none';
              wobble(el);
            });
          });
          break;
        // BASKETBALL HOOP — throw the ball and it arcs into the net
        case 'hoop':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            const ballEl = pl.querySelector('.prop[data-id="basketball"]');
            if (!ballEl) { Audio.sfx('boing'); wobble(el); return; }
            App.locked = true;
            const bx = +ballEl.dataset.x, by = +ballEl.dataset.y;
            const tx = p.x, ty = p.y - 92;                 // the rim
            Audio.sfx('whee');
            tween(760, t => {
              const e2 = easeInOut(t);
              const x = bx + (tx - bx) * e2;
              const y = by + (ty - by) * e2 - Math.sin(t * Math.PI) * 210;   // the arc
              ballEl.setAttribute('transform', `translate(${x} ${y}) scale(${ballEl.dataset.s || 1}) rotate(${t * 360})`);
            }, () => {
              Audio.sfx('bounce');
              const net = el.querySelector('.net');
              if (net) tween(420, t => net.setAttribute('transform', `translate(0 ${Math.sin(t * Math.PI) * 10})`),
                () => net.setAttribute('transform', ''));
              // drop out of the net and settle back on the floor
              tween(420, t => {
                const y = ty + (by - ty) * t;
                ballEl.setAttribute('transform', `translate(${tx} ${y}) scale(${ballEl.dataset.s || 1})`);
              }, () => {
                setXY(ballEl, tx, by);
                sortDepth(ballEl.parentNode);
                Audio.sfx('clap');
                confettiBurst(p.x, p.y - 150);
                Audio.say('Shoot! Ang galing!');
                App.locked = false;
              });
            });
          });
          break;
        // PIANO — each key is a note, and it plays a little tune
        case 'piano':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            const notes = [523, 587, 659, 698, 784, 880, 988];
            const tune = [0, 2, 4, 2, 0, 4, 6, 4];
            tune.forEach((n, i) => setTimeout(() => Audio.note(notes[n]), i * 190));
            tween(1700, t => {
              const k = 1 + Math.sin(t * Math.PI * 8) * 0.03;
              el.setAttribute('transform', `translate(${p.x} ${p.y}) scale(${p.s * k} ${p.s / k})`);
            }, () => setXY(el, p.x, p.y));
          });
          break;
        // BUBBLE JAR — puffs out bubbles you can chase and pop
        case 'bubbles':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            Audio.sfx('pop');
            wobble(el);
            const fx = $('#fxLayer');
            for (let i = 0; i < 9; i++) {
              const b = document.createElementNS(SVGNS, 'g');
              b.setAttribute('style', 'cursor:pointer');
              const r = rand(16, 34);
              b.innerHTML = `<circle r="${r}" fill="#bfe8f2" opacity="0.45" stroke="#8ecae6" stroke-width="3"/>
                <circle cx="${-r / 3}" cy="${-r / 3}" r="${r / 4}" fill="#fff" opacity="0.85"/>`;
              fx.appendChild(b);
              let popped = false;
              b.addEventListener('pointerdown', ev => {
                ev.stopPropagation();
                if (popped) return;
                popped = true; Audio.sfx('pop'); b.remove();
              });
              const sx = p.x + rand(-14, 14), sy = p.y - 70;
              const drift = rand(-150, 150), rise = rand(420, 640), dur = rand(2800, 4600);
              tween(dur, t => b.setAttribute('transform',
                `translate(${sx + drift * t + Math.sin(t * 9) * 16} ${sy - rise * t})`),
                () => { if (!popped) b.remove(); });
            }
          });
          break;
        // BOUNCY BALL — tap it and it bounces around the room
        case 'bouncy':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            Audio.sfx('bounce');
            const x0 = +el.dataset.x, y0 = +el.dataset.y;
            const dx = rand(-260, 260);
            tween(1500, t => {
              const x = x0 + dx * t;
              const hops = Math.abs(Math.sin(t * Math.PI * 3)) * 190 * (1 - t * 0.55);
              el.setAttribute('transform', `translate(${clamp(x, 80, 1520)} ${y0 - hops}) scale(${el.dataset.s || 1})`);
            }, () => {
              setXY(el, clamp(x0 + dx, 80, 1520), y0);
              sortDepth(el.parentNode);
              Audio.sfx('boing');
            });
          });
          break;
        case 'flash':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            hero.approach(p.x, p.y, 210, () => {
              Audio.sfx('chime');
              const fx = $('#fxLayer');
              fx.innerHTML = `<rect width="1600" height="900" fill="#fff"/>`;
              setTimeout(() => { fx.innerHTML = ''; }, 180);
            });
          });
          break;
      }
    });

    // ---- tiny optional wish (thought bubble)
    this.taskState = null;
    const task = HOUSE_TASKS[h.id];
    const taskProp = task && props.find(p => p.id === task.propId);
    const tp = task && residentPos[task.target];
    if (task && taskProp && tp) {
      const bx = tp.x + 30, by = tp.y - 320; // above the resident's head
      const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      bubble.setAttribute('id', 'wishBubble');
      bubble.innerHTML = `
        <g transform="translate(${bx} ${by})">
          <circle cx="-72" cy="76" r="10" fill="#fff" opacity="0.95"/>
          <circle cx="-54" cy="56" r="16" fill="#fff" opacity="0.95"/>
          <ellipse cx="0" cy="0" rx="92" ry="70" fill="#fff" opacity="0.97"/>
          <ellipse cx="-58" cy="-22" rx="42" ry="34" fill="#fff" opacity="0.97"/>
          <ellipse cx="56" cy="-20" rx="44" ry="36" fill="#fff" opacity="0.97"/>
          <g transform="scale(0.55) translate(0 10)">${propArt(taskProp)}</g>
          <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="2.6s" repeatCount="indefinite" additive="sum"/>
        </g>`;
      $('#fxLayer').before(bubble);
      this.taskState = { ...task, tp, done: false };
    }

    $('#homeBtn').addEventListener('pointerdown', e => {
      e.stopPropagation();
      App.go('map');
    });
    wireMuteButton();
  },
  onPropDrop(h, p, x, y, el) {
    const ts = this.taskState;
    if (!ts || ts.done || p.id !== ts.propId) return;
    if (dist(x, y, ts.tp.x, ts.tp.y - 110) > 190) return;
    ts.done = true;
    const bubble = $('#wishBubble');
    if (bubble) {
      Audio.sfx('sparkle');
      tween(300, t => bubble.setAttribute('opacity', 1 - t), () => bubble.remove());
    }
    Audio.sfx('fanfare');
    confettiBurst(ts.tp.x, ts.tp.y - 260);
    const target = stage.querySelector(`.resident[data-key="${ts.target}"]`);
    if (target) { waveCharacter(target); setTimeout(() => waveCharacter(target), 1300); }
    setTimeout(() => Audio.say(cheerLine()), 500);
  },
  exit() {
    if (this.hero) { this.hero.destroy(); this.hero = null; }
  }
};

// ============================================================ DRESS-UP
Scenes.dressup = {
  cat: 'top',
  enter() {
    this.cat = 'top';
    const boy = heroGender() === 'boy';
    // The room recolours to the hero: the dress-up screen is theirs, not Eya's.
    const tint = boy ? { bg1: '#dff0fb', bg2: '#c9e4f6', ink: '#3d86bd', on: '#cfe8fb', off: '#d4e4ef' }
                     : { bg1: '#fde8f0', bg2: '#f6d8ec', ink: '#e8709c', on: '#ffd7e6', off: '#e8d0dc' };
    this.tint = tint;
    stage.innerHTML = `
      ${SHARED_DEFS}
      <defs>
        <linearGradient id="duBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="${tint.bg1}"/><stop offset="1" stop-color="${tint.bg2}"/>
        </linearGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#duBg)"/>
      <circle cx="820" cy="430" r="300" fill="#fff" opacity="0.55"/>
      <g fill="${tint.ink}" opacity="0.45">
        <circle cx="1300" cy="150" r="10"/><circle cx="1350" cy="110" r="7"/><circle cx="260" cy="640" r="9"/>
        <circle cx="480" cy="130" r="8" fill="#ffd94d"/><circle cx="1240" cy="620" r="8" fill="#ffd94d"/>
      </g>
      <ellipse cx="820" cy="668" rx="120" ry="26" fill="#2a1a3a" opacity="0.14"/>
      ${bigLabel(800, 92, 'Bihis Tayo!', { size: 60, fill: tint.ink, stroke: '#fff' })}
      <g id="duHero"></g>
      <g id="duTabs"></g>
      <g id="duItems"></g>
      <g id="backBtn" style="cursor:pointer" filter="url(#soft)">
        <circle cx="92" cy="94" r="58" fill="#fff" opacity="0.95"/>
        <path d="M 118 94 L 74 94 M 92 72 L 70 94 L 92 116" stroke="${tint.ink}" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      ${muteButtonSVG()}
    `;
    this.renderHero();
    this.renderTabs();
    this.renderItems();
    // Back to the hero's own house — the one the wardrobe actually stands in.
    $('#backBtn').addEventListener('pointerdown', () => App.go('house:' + heroHome().id));
    wireMuteButton();
  },
  renderHero() {
    $('#duHero').innerHTML = buildCharacter(heroSpec(), { x: 820, y: 660, scale: 1.35, idle: true });
  },
  renderTabs() {
    const rack = wardrobeFor(heroGender());
    const tabs = CATS.map(cat => ({ cat, icon: rack[cat][0].icon }));
    const t9 = this.tint;
    $('#duTabs').innerHTML = tabs.map((t, i) => `
      <g class="duTab" data-cat="${t.cat}" style="cursor:pointer" transform="translate(160 ${260 + i * 190})" filter="url(#soft)">
        <circle r="76" fill="${this.cat === t.cat ? t9.on : '#fff'}"
          stroke="${this.cat === t.cat ? t9.ink : t9.off}" stroke-width="7"/>
        <g transform="scale(1.5)">${t.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duTab').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        this.cat = el.dataset.cat;
        Audio.sfx('pop');
        this.renderTabs();
        this.renderItems();
      });
    });
  },
  renderItems() {
    const items = wardrobeFor(heroGender())[this.cat];
    const t9 = this.tint;
    // Fit any number of items in the row centered at x≈930 (right of the tabs).
    const n = items.length;
    const spacing = n > 1 ? Math.min(190, 1180 / (n - 1)) : 0;
    const r = Math.min(80, spacing * 0.46) || 80;
    const iconScale = 1.6 * (r / 80);
    const startX = 930 - (n - 1) * spacing / 2;
    $('#duItems').innerHTML = items.map((it, i) => `
      <g class="duItem" data-id="${it.id}" style="cursor:pointer" transform="translate(${startX + i * spacing} 790)" filter="url(#soft)">
        <circle r="${r}" fill="${State.outfit[this.cat] === it.id ? t9.on : '#fff'}"
          stroke="${State.outfit[this.cat] === it.id ? t9.ink : t9.off}" stroke-width="7"/>
        <g transform="scale(${iconScale})">${it.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duItem').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        State.outfit[this.cat] = el.dataset.id;
        State.saveOutfit();
        Audio.sfx('sparkle');
        this.renderHero();
        this.renderItems();
      });
    });
  },
  exit() {}
};

// ============================================================ ENGINE
const App = {
  root: stage,
  current: null,
  locked: false,           // guards mid-sequence navigation (door opening)
  _lastGo: 0,
  go(id) {
    if (App.locked) return;
    const now = performance.now();
    if (App.current && now - App._lastGo < 350) return; // toddler double-tap guard (never blocks the first scene)
    App._lastGo = now;
    if (App.current && App.current.exit) App.current.exit();
    const [name, param] = id.split(':');
    App.current = Scenes[name];
    App.current.enter(param);
    // Scenes build people and props into whatever layer reads best in the markup.
    // Once built, everything that stands on the floor is collected and y-sorted.
    collectDepthLayer(['.prop', '.resident', '.person']);
    applyMotionPreference();
  }
};

// block context menu / long-press menus and pinch zoom
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

// Restore the chosen kid. An unknown id (a kid removed since last play) is
// treated as no choice at all, which sends the player back to the pick screen.
let savedHero = null;
try { savedHero = localStorage.getItem('soft-hero'); } catch (e) {}
if (savedHero && heroKids().includes(savedHero)) setHero(savedHero);
else State.loadOutfit();   // no hero yet: defaults, so the title can still draw

// offline support (no-op on file:// or unsupported browsers)
try {
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js');
  }
} catch (e) {}

// Portrait handling: rotate the stage 90° to fill the screen so the game stays
// playable and upright even when the phone's rotation lock keeps it in portrait.
// In landscape we clear the inline styles and let the CSS 16:9 fit take over.
function fitStage() {
  const portrait = window.innerHeight > window.innerWidth;
  const s = stage.style;
  if (portrait) {
    const availLong = window.innerHeight, availShort = window.innerWidth;
    let w = availLong, h = w * 9 / 16;          // try to fill screen height
    if (h > availShort) { h = availShort; w = h * 16 / 9; }  // else fit screen width
    s.width = w + 'px';
    s.height = h + 'px';
    s.maxWidth = 'none';
    s.maxHeight = 'none';
    s.transform = 'rotate(90deg)';
    stageRot = 90;                    // toStage() has to undo this by hand
  } else {
    s.width = s.height = s.maxWidth = s.maxHeight = s.transform = '';
    stageRot = 0;
  }
}
fitStage();
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));

// iOS restores suspended pages instead of reloading — recover cleanly.
window.addEventListener('pageshow', e => {
  if (e.persisted) location.reload();
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    Audio.unlock();
    try { speechSynthesis.cancel(); } catch (e) {}
  }
});

// #lineup, #pick, #map, #house-<id>, #place-<id>, #dressup are debug entry points.
// Every scene but the title, the lineup and the pick screen needs a hero; jumping
// straight to one with no kid chosen would draw a game with no player in it, so
// those entry points seed a hero first (`#map=timmy` picks who).
const [dbg, dbgHero] = location.hash.slice(1).split('=');
const needsHero = !['', 'title', 'lineup', 'pick'].includes(dbg);
if (needsHero && !State.hero) setHero(heroKids().includes(dbgHero) ? dbgHero : heroKids()[0]);

App.go(dbg === 'lineup' ? 'lineup'
  : dbg === 'pick' ? 'pick'
  : dbg === 'map' ? 'map'
  : dbg === 'dressup' ? 'dressup'
  : dbg.startsWith('house-') ? 'house:' + dbg.slice(6)
  : dbg.startsWith('place-') ? 'place:' + dbg.slice(6)
  : 'title');
</script>
</body>
